<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>DNX Store — конфиденциальность</title><style>body{max-width:760px;margin:40px auto;padding:0 20px;background:#05030b;color:#eee;font:16px/1.6 system-ui}h1{color:#ff5e96}</style></head><body><h1>Конфиденциальность</h1><p>DNX Store обрабатывает Telegram ID, username, публичный TON-адрес и данные платежей, необходимые для работы магазина. Приватные ключи и seed-фразы не запрашиваются и не хранятся.</p><p>Операции TON публичны и доступны в блокчейне.</p></body></html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNX STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #080808;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- ЧЕСТНЫЙ НЕОН --- */
        header {
            width: 100%;
            padding: 40px 0 20px 0;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
            color: #fff;
            font-weight: 900;
            /* Многослойный неон: белый центр + золотое свечение */
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #f4d03f,
                0 0 20px #f4d03f,
                0 0 40px rgba(244, 208, 63, 0.5);
        }

        .subtitle {
            font-size: 0.65rem;
            color: #888;
            margin-top: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- КНОПКИ 4:1 --- */
        .catalog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            padding: 10px 15px;
            box-sizing: border-box;
        }

        .item-card {
            background: #111;
            border: 1px solid #1a1a1a;
            border-radius: 22px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .item-image {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .item-name {
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #fff;
        }

        .card-buttons {
            display: flex;
            width: 100%;
            gap: 8px;
        }

        /* Кнопка с ценой (80% ширины) */
        .btn-buy-now {
            flex: 4; 
            background: #f4d03f;
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 12px 0;
            font-weight: 900;
            font-size: 0.9rem;
            text-transform: uppercase;
            /* Продольная надпись */
            letter-spacing: 1.5px; 
            cursor: pointer;
        }

        /* Кнопка корзины (20% ширины) */
        .btn-add-cart {
            flex: 1;
            background: #1a1a1a;
            border: 1.5px solid #f4d03f;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-icon-svg { 
            width: 18px; 
            height: 18px; 
            fill: none; 
            stroke: #f4d03f; 
            stroke-width: 2.5; 
        }

        /* --- ТАБ-БАР --- */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
        }

        .tab-item { color: #555; font-size: 0.7rem; font-weight: 800; cursor: pointer; }
        .tab-item.active { color: #f4d03f; }
    </style>
</head>
<body>

    <header>
        <h1>DNX Store</h1>
        <div class="subtitle">Exclusive Digital Assets</div>
    </header>

    <div class="catalog-grid">
        <div class="item-card">
            <img src="https://via.placeholder.com/150" class="item-image">
            <div class="item-name">NFT Golden Star</div>
            <div class="card-buttons">
                <button class="btn-buy-now">1500 ₽</button>
                <button class="btn-add-cart">
                    <svg class="btn-icon-svg" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
                </button>
            </div>
        </div>
        
        <div class="item-card">
            <img src="https://via.placeholder.com/150" class="item-image">
            <div class="item-name">NFT Blue Rabbit</div>
            <div class="card-buttons">
                <button class="btn-buy-now">500 ₽</button>
                <button class="btn-add-cart">
                    <svg class="btn-icon-svg" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active">МАГАЗИН</div>
        <div class="tab-item">ИНВЕНТАРЬ</div>
    </div>

</body>
</html>

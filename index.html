<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNX STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #080808;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* --- ШАПКА: УБАВЛЕННАЯ ЯРКОСТЬ И ЖИРНОСТЬ --- */
        header {
            width: 100%;
            padding: 30px 0 10px 0;
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 1.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            color: #fff;
            font-weight: 800; /* Чуть менее жирный (был 900) */
            /* Капельку убавил яркость свечения */
            text-shadow: 
                0 0 4px rgba(255, 255, 255, 0.9),
                0 0 8px rgba(244, 208, 63, 0.7),
                0 0 15px rgba(244, 208, 63, 0.5),
                0 0 30px rgba(244, 208, 63, 0.3);
        }

        .subtitle {
            font-size: 0.65rem;
            color: #777;
            margin-top: 4px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        .cart-btn-header {
            position: absolute;
            right: 15px;
            top: 62px;
            background: rgba(25, 25, 25, 0.95);
            border: 1px solid #333;
            padding: 4px 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .cart-icon-svg { width: 15px; height: 15px; fill: none; stroke: #fff; stroke-width: 2; }
        .cart-count {
            color: #f4d03f;
            font-size: 0.75rem;
            margin-left: 6px;
            font-weight: 800;
        }

        /* --- КАРТОЧКИ: ПРОДОЛЬНЫЕ КНОПКИ --- */
        .catalog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            padding: 15px 12px;
            box-sizing: border-box;
        }

        .item-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .item-image {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 14px;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .item-name {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #ddd;
        }

        .card-buttons {
            display: flex;
            gap: 8px;
            margin-top: auto;
        }

        /* Более продольная кнопка купить */
        .btn-buy-now {
            flex: 2; /* Занимает больше места */
            background: linear-gradient(45deg, #d4af37, #f4d03f);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 10px 4px; /* Узкая по вертикали, широкая по горизонтали */
            font-weight: 800;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Более продольная кнопка корзины */
        .btn-add-cart {
            flex: 1; /* Тоже вытянутая */
            background: #1a1a1a;
            border: 1px solid #f4d03f;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-icon-svg { width: 16px; height: 16px; fill: none; stroke: #f4d03f; stroke-width: 2; }

        /* --- ОСТАЛЬНОЕ --- */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #080808;
            border-top: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-around;
            padding: 18px 0;
            z-index: 1000;
        }

        .tab-item { color: #444; font-size: 0.7rem; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; }
        .tab-item.active { color: #f4d03f; }

        .page { display: none; width: 100%; }
        .page-active { display: block; }
    </style>
</head>
<body>

    <header>
        <h1>DNX Store</h1>
        <div class="subtitle">Exclusive Digital Assets</div>
        <div class="cart-btn-header" onclick="showPage('cart')">
            <svg class="cart-icon-svg" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
            <span class="cart-count" id="cart-counter">0</span>
        </div>
    </header>

    <div id="page-catalog" class="page page-active">
        <div id="catalog-list" class="catalog-grid"></div>
    </div>

    <div id="page-cart" class="page" style="padding: 20px;">
        <h2 style="text-align:center; font-size:1.1rem;">КОРЗИНА</h2>
        <div id="cart-items-list"></div>
        <div id="cart-total" style="text-align:right; font-weight:800; font-size:1.2rem; color:#f4d03f; margin: 20px 0;"></div>
        <button onclick="buyCart()" style="width:100%; background:#f4d03f; color:#000; border:none; padding:16px; border-radius:12px; font-weight:800;">ОФОРМИТЬ ЗАКАЗ</button>
    </div>

    <div id="page-inventory" class="page" style="padding: 20px;">
        <h2 style="text-align:center; font-size:1.1rem;">ИНВЕНТАРЬ</h2>
        <div id="inventory-list"></div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" id="tab-catalog" onclick="showPage('catalog')">МАГАЗИН</div>
        <div class="tab-item" id="tab-inventory" onclick="showPage('inventory')">ИНВЕНТАРЬ</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = 'https://dnx-shop.onrender.com';
        let cart = [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById('page-' + pageId).classList.add('page-active');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + pageId)?.classList.add('active');
            if(pageId === 'inventory') loadInventory();
            if(pageId === 'cart') renderCart();
        }

        async function loadCatalog() {
            try {
                const res = await fetch(`${API_BASE}/items`);
                const items = await res.json();
                document.getElementById('catalog-list').innerHTML = items.map(item => `
                    <div class="item-card">
                        <img src="${item.image_url}" class="item-image">
                        <div class="item-name">${item.name}</div>
                        <div class="card-buttons">
                            <button class="btn-buy-now" onclick="buyNow(${item.id})">${item.price} ₽</button>
                            <button class="btn-add-cart" onclick="addToCart(${item.id})">
                                <svg class="btn-icon-svg" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        function addToCart(id) {
            if(!cart.includes(id)) {
                cart.push(id);
                document.getElementById('cart-counter').innerText = cart.length;
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function buyNow(id) {
            cart = [id];
            showPage('cart');
        }

        loadCatalog();
    </script>
</body>
</html>

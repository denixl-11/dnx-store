<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNX STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-card: linear-gradient(145deg, #131315 0%, #0d0d0f 100%);
            --accent-gold: #cba153;
            --accent-gold-dim: rgba(203, 161, 83, 0.15);
            --text-main: #e8e8e8;
            --text-muted: #7a7a7c;
            --border-color: #222224;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { overflow-x: hidden; width: 100%; }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding-bottom: 100px; 
            -webkit-font-smoothing: antialiased; 
        }

        header { width: 100%; padding: 40px 0 25px 0; text-align: center; position: relative; border-bottom: 1px solid var(--border-color); }
        
        h1 { 
            font-weight: 800; 
            font-size: 1.7rem; 
            text-transform: uppercase; 
            margin: 0; 
            letter-spacing: 3px; 
            color: #fff; 
            text-shadow: 0 0 10px rgba(203, 161, 83, 0.4), 
                         0 0 20px rgba(203, 161, 83, 0.2), 
                         0 0 30px rgba(203, 161, 83, 0.1); 
        }
        
        .subtitle { font-size: 0.65rem; color: var(--text-muted); margin-top: 6px; letter-spacing: 3px; text-transform: uppercase; font-weight: 500; }
        
        .cart-btn-header { 
            position: absolute; right: 20px; top: 55%; transform: translateY(-50%); 
            display: flex; align-items: center; 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border-color); 
            padding: 8px 14px; border-radius: 12px; cursor: pointer; 
            backdrop-filter: blur(10px); transition: 0.3s ease;
        }
        .cart-btn-header:active { transform: translateY(-50%) scale(0.95); }
        #cart-counter { color: var(--accent-gold); font-weight: 600; margin-left: 8px; font-size: 0.9rem; }
        
        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; padding: 20px; box-sizing: border-box; }
        
        .item-card { 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            padding: 12px; 
            display: flex; 
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .item-card:hover { border-color: rgba(203, 161, 83, 0.3); }
        
        .item-image { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; margin-bottom: 14px; }
        
        .item-name { 
            font-size: 0.95rem; font-weight: 500; margin-bottom: 14px; color: var(--text-main); 
            width: 100%; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            text-align: center; letter-spacing: 0.5px;
        }
        
        .card-buttons { display: flex; width: 100%; gap: 8px; }
        
        .btn-buy-now { 
            flex: 1; 
            background: linear-gradient(135deg, #cba153 0%, #a47d33 100%); 
            color: #050505; border: none; border-radius: 10px; height: 36px; 
            font-weight: 700; font-size: 0.85rem; letter-spacing: 1px; 
            text-transform: uppercase; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(203, 161, 83, 0.2);
        }
        
        .btn-add-cart { 
            width: 40px; background: rgba(255, 255, 255, 0.02); 
            border: 1px solid var(--accent-gold); border-radius: 10px; height: 36px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
        }
        
        .btn-tg-link-full {
            width: 100%; background: transparent; border: 1px solid var(--border-color); 
            border-radius: 10px; height: 36px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; margin-top: 8px; box-sizing: border-box; 
            transition: 0.2s; color: var(--text-muted); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-tg-link-full svg { margin-right: 6px; }
        
        .cart-list { padding: 20px; width: 100%; box-sizing: border-box; }
        .cart-item { 
            display: flex; align-items: center; background: var(--bg-card); 
            padding: 12px; border-radius: 14px; margin-bottom: 12px; 
            border: 1px solid var(--border-color); 
        }
        .cart-item img { width: 56px; height: 56px; border-radius: 10px; margin-right: 16px; object-fit: cover; }
        .cart-item-info { flex-grow: 1; }
        .cart-item-name { font-weight: 500; font-size: 0.95rem; margin-bottom: 6px; color: var(--text-main); }
        .cart-item-price { color: var(--accent-gold); font-weight: 600; font-size: 0.9rem; }
        
        .fixed-footer { position: fixed; bottom: 80px; width: 100%; padding: 20px; box-sizing: border-box; background: linear-gradient(to top, #0a0a0c 80%, transparent); z-index: 90; }
        
        .btn-main-action { 
            width: 100%; background: linear-gradient(135deg, #cba153 0%, #a47d33 100%); 
            color: #050505; border: none; border-radius: 12px; height: 52px; 
            font-weight: 700; font-size: 0.95rem; text-transform: uppercase; 
            letter-spacing: 1px; cursor: pointer; box-shadow: 0 4px 20px rgba(203, 161, 83, 0.2);
        }
        .btn-secondary { 
            width: 100%; background: transparent; color: var(--text-muted); 
            border: 1px solid var(--border-color); border-radius: 12px; height: 52px; 
            font-weight: 500; font-size: 0.95rem; margin-top: 12px; cursor: pointer; 
        }
        
        .payment-box { 
            background: var(--bg-card); padding: 24px; border-radius: 16px; 
            border: 1px solid var(--border-color); margin-top: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .req-input-group { display: flex; gap: 10px; margin-top: 12px; }
        .req-input { 
            flex-grow: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); 
            color: var(--text-main); padding: 12px; border-radius: 10px; 
            font-family: inherit; font-size: 0.9rem; letter-spacing: 1px;
        }
        .btn-copy { 
            background: var(--border-color); border: none; color: var(--text-main); 
            width: 46px; display: flex; align-items: center; justify-content: center; 
            border-radius: 10px; cursor: pointer; transition: 0.2s;
        }

        .page { display: none; width: 100%; animation: fadeIn 0.3s ease; }
        .page-active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .tab-bar { 
            position: fixed; bottom: 0; width: 100%; background: rgba(10, 10, 12, 0.85); 
            backdrop-filter: blur(15px); border-top: 1px solid var(--border-color); 
            display: flex; justify-content: space-around; padding: 20px 0 25px 0; z-index: 100; 
        }
        .tab-item { 
            color: var(--text-muted); font-size: 0.7rem; font-weight: 600; 
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .tab-item.active { color: var(--accent-gold); text-shadow: 0 0 10px rgba(203, 161, 83, 0.3); }

        .inventory-top-tabs {
            display: flex; width: 100%; border-bottom: 1px solid var(--border-color);
            padding: 0 20px; margin-bottom: 20px; box-sizing: border-box; background: rgba(10, 10, 12, 0.5);
        }
        .inv-top-tab {
            flex: 1; text-align: center; padding: 16px 0; color: var(--text-muted);
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; border-bottom: 2px solid transparent; transition: 0.3s;
        }
        .inv-top-tab.active { color: var(--text-main); border-bottom: 2px solid var(--accent-gold); }

        .btn-open-nft {
            display: flex; justify-content: center; align-items: center; 
            background: transparent; color: var(--text-main); border: 1px solid var(--border-color); 
            text-decoration: none; border-radius: 10px; height: 36px; 
            font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
            width: 100%; box-sizing: border-box; margin-bottom: 8px;
        }

        .btn-withdraw {
            display: flex; justify-content: center; align-items: center;
            background: var(--text-main); color: var(--bg-main); border: none;
            border-radius: 10px; height: 36px; font-weight: 700; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 0.5px; width: 100%; box-sizing: border-box;
            cursor: pointer; transition: 0.3s;
        }
        .btn-withdraw svg { margin-left: 8px; }
        
        .btn-withdraw.loading {
            background: var(--text-muted); cursor: wait; pointer-events: none; opacity: 0.8;
        }

        /* КРУТИЛКА ЗАГРУЗКИ */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(10, 10, 12, 0.2);
            border-top-color: var(--bg-main);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .history-tag {
            text-align: center; color: var(--text-muted); font-size: 0.7rem; font-weight: 600;
            border: 1px dashed var(--border-color); border-radius: 10px; padding: 8px 0; margin-top: 8px;
            text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1>DNX STORE</h1>
        <div class="subtitle">Exclusive Digital Assets</div>
        <div class="cart-btn-header" onclick="showPage('cart')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-main)" stroke-width="2">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/>
            </svg>
            <span id="cart-counter">0</span>
        </div>
    </header>

    <div id="page-store" class="page page-active">
        <div class="catalog-grid" id="catalog-list"></div>
    </div>

    <div id="page-cart" class="page">
        <div id="cart-items-list" class="cart-list"></div>
        <div class="fixed-footer" id="pay-footer" style="display: none;">
            <button class="btn-main-action" onclick="goToPayment('cart')">Перейти к оплате</button>
        </div>
    </div>

    <div id="page-payment" class="page">
        <div style="padding: 30px 20px;">
            <h2 style="text-align: center; color: var(--text-main); margin-top: 0; font-weight: 700; font-size: 1.2rem; letter-spacing: 1px;">ОФОРМЛЕНИЕ ЗАКАЗА</h2>
            <p style="text-align: center; color: var(--text-muted); font-size: 0.85rem; line-height: 1.5; margin-bottom: 30px;">Переведите точную сумму по реквизитам ниже. Бронь действует 20 минут.</p>
            
            <div class="payment-box">
                <div style="color: var(--text-muted); font-size: 0.75rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;">Сумма к оплате</div>
                <div id="payment-amount" style="font-size: 2rem; font-weight: 800; color: var(--accent-gold); margin-bottom: 24px;">0 ₽</div>
                
                <div style="color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;">Реквизиты (СБП / Карта)</div>
                <div class="req-input-group">
                    <input type="text" id="req-card" class="req-input" value="1111 2222 3333 4444" readonly>
                    <button class="btn-copy" onclick="copyReq()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div style="margin-top: 40px;">
                <button class="btn-main-action" onclick="checkPayment()">Проверить оплату</button>
                <button class="btn-secondary" onclick="cancelPayment()">Отмена</button>
            </div>
        </div>
    </div>

    <div id="page-inventory" class="page">
        <div class="inventory-top-tabs">
            <div class="inv-top-tab active" onclick="switchInvTab('active', this)">Мои NFT</div>
            <div class="inv-top-tab" onclick="switchInvTab('history', this)">История выводов</div>
        </div>
        
        <div id="inventory-active-container" class="catalog-grid"></div>
        <div id="inventory-history-container" class="catalog-grid" style="display: none;"></div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" id="tab-store" onclick="showPage('store')">МАГАЗИН</div>
        <div class="tab-item" id="tab-inventory" onclick="showPage('inventory')">ИНВЕНТАРЬ</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = 'https://dnx-shop.onrender.com';
        let cart = [];
        let currentBookingIds = []; 
        
        let inventoryItemsData = [];
        // Сохраняем ID тех NFT, вывод которых мы ожидаем
        let withdrawPending = JSON.parse(localStorage.getItem('withdrawPending') || '{}');

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById('page-' + pageId).classList.add('page-active');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            
            if(pageId === 'store') document.getElementById('tab-store').classList.add('active');
            if(pageId === 'cart') renderCart();
            
            if(pageId === 'inventory') {
                document.getElementById('tab-inventory').classList.add('active');
                loadInventory(); 
            }
            
            tg.HapticFeedback.impactOccurred('light');
        }

        function openInAppBrowser(url) {
            if (!url) return;
            if (url.includes('t.me') || url.includes('telegram.me')) {
                tg.openTelegramLink(url);
            } else {
                tg.openLink(url); 
            }
        }

        function addToCart(item) {
            cart.push(item);
            document.getElementById('cart-counter').innerText = cart.length;
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert(`Добавлено: ${item.name}`);
        }

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            const footer = document.getElementById('pay-footer');
            if (cart.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding: 60px 20px; color:var(--text-muted); font-size: 0.9rem;">Корзина пуста</div>';
                footer.style.display = 'none';
            } else {
                list.innerHTML = cart.map((item, index) => `
                    <div class="cart-item">
                        <img src="${item.image_url}">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price} ₽</div>
                        </div>
                        <div style="color: var(--text-muted); font-size: 1.5rem; padding: 0 10px; cursor: pointer; font-weight: 300;" onclick="removeFromCart(${index})">×</div>
                    </div>
                `).join('');
                footer.style.display = 'block';
            }
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            document.getElementById('cart-counter').innerText = cart.length;
            renderCart();
            tg.HapticFeedback.impactOccurred('medium');
        }

        async function goToPayment(type, itemId = null, price = 0) {
            let total = 0;
            currentBookingIds = [];

            if (type === 'cart') {
                total = cart.reduce((sum, item) => sum + parseInt(item.price), 0);
                currentBookingIds = cart.map(item => item.id);
            } else {
                total = parseInt(price);
                let parsedId = isNaN(Number(itemId)) ? itemId : Number(itemId);
                currentBookingIds = [parsedId];
            }

            try {
                const response = await fetch(`${API_BASE}/book`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items: currentBookingIds,
                        userId: tg.initDataUnsafe?.user?.id,
                        username: tg.initDataUnsafe?.user?.username
                    })
                });
                const data = await response.json();
                if (!data.success) {
                    tg.showAlert('Один или несколько NFT уже кем-то забронированы или куплены!');
                    return; 
                }
            } catch (e) { console.error("Ошибка бронирования", e); }

            document.getElementById('payment-amount').innerText = total + ' ₽';
            showPage('payment');
        }

        function copyReq() {
            const reqInput = document.getElementById('req-card');
            reqInput.select();
            document.execCommand('copy');
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert('Реквизиты скопированы!');
        }

        async function checkPayment() {
            try {
                await fetch(`${API_BASE}/notify-admin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items: currentBookingIds,
                        userId: tg.initDataUnsafe?.user?.id,
                        username: tg.initDataUnsafe?.user?.username
                    })
                });
            } catch(e) { console.error(e); }

            tg.showAlert('Запрос отправлен администратору. Ожидайте зачисления NFT в инвентарь.');
            cart = []; 
            document.getElementById('cart-counter').innerText = '0';
            currentBookingIds = [];
            showPage('store');
        }

        async function cancelPayment() {
            try {
                await fetch(`${API_BASE}/cancel-booking`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: currentBookingIds })
                });
            } catch(e) {}
            
            currentBookingIds = [];
            showPage('store');
        }

        async function loadCatalog() {
            try {
                const res = await fetch(`${API_BASE}/items`);
                const items = await res.json();
                document.getElementById('catalog-list').innerHTML = items.map(item => `
                    <div class="item-card">
                        <img src="${item.image_url}" class="item-image">
                        <div class="item-name">${item.name}</div>
                        <div class="card-buttons">
                            <button class="btn-buy-now" onclick="goToPayment('item', '${item.id}', ${item.price})">${item.price} ₽</button>
                            <button class="btn-add-cart" onclick='addToCart(${JSON.stringify(item)})'>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-gold)" stroke-width="2.5">
                                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/>
                                </svg>
                            </button>
                        </div>
                        <button class="btn-tg-link-full" onclick="openInAppBrowser('${item.nft_link}')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--text-muted)">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.06-.2-.07-.06-.17-.04-.25-.02-.11.02-1.83 1.16-5.16 3.41-.48.33-.92.5-1.32.49-.44-.01-1.28-.24-1.9-.44-.76-.25-1.36-.38-1.3-.8.03-.22.33-.45.9-.68 3.55-1.54 5.92-2.57 7.11-3.06 3.39-1.4 4.1-1.65 4.56-1.66.11 0 .33.03.47.14.12.1.15.24.16.35-.01.06-.01.17-.02.28z"/>
                            </svg>
                            Смотреть
                        </button>
                    </div>
                `).join('');
            } catch (e) { 
                document.getElementById('catalog-list').innerHTML = '<p style="text-align:center;width:100%;color:var(--text-muted); grid-column: span 2; font-size: 0.9rem;">Ошибка загрузки товаров</p>';
            }
        }

        function switchInvTab(tab, element) {
            document.querySelectorAll('.inv-top-tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            
            if (tab === 'active') {
                document.getElementById('inventory-active-container').style.display = 'grid';
                document.getElementById('inventory-history-container').style.display = 'none';
            } else {
                document.getElementById('inventory-active-container').style.display = 'none';
                document.getElementById('inventory-history-container').style.display = 'grid';
            }
            tg.HapticFeedback.impactOccurred('light');
        }

        async function loadInventory() {
            const userId = tg.initDataUnsafe?.user?.id;
            const container = document.getElementById('inventory-active-container');
            
            if (!userId) {
                container.innerHTML = '<div style="padding: 100px 20px; text-align: center; color: var(--text-muted); grid-column: span 2; font-size: 0.85rem;">ОШИБКА: НЕТ ID ПОЛЬЗОВАТЕЛЯ</div>';
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/inventory?user_id=${userId}`);
                inventoryItemsData = await res.json();
                renderInventoryTabs();
            } catch (e) {
                container.innerHTML = '<div style="padding: 100px 20px; text-align: center; color: var(--text-muted); grid-column: span 2; font-size: 0.85rem;">ОШИБКА ЗАГРУЗКИ</div>';
            }
        }

        function renderInventoryTabs() {
            const activeContainer = document.getElementById('inventory-active-container');
            const historyContainer = document.getElementById('inventory-history-container');
            
            const activeItems = inventoryItemsData.filter(i => i.status !== 'withdrawn');
            const historyItems = inventoryItemsData.filter(i => i.status === 'withdrawn');

            // Рендер активных (если предмет в обработке вывода - показываем крутилку)
            if (activeItems.length === 0) {
                activeContainer.innerHTML = '<div style="padding: 100px 20px; text-align: center; color: var(--text-muted); grid-column: span 2; font-size: 0.9rem;">У ВАС НЕТ NFT</div>';
            } else {
                activeContainer.innerHTML = activeItems.map(item => {
                    const isPending = !!withdrawPending[item.id];
                    return `
                        <div class="item-card">
                            <img src="${item.image_url}" class="item-image">
                            <div class="item-name">${item.name}</div>
                            <button class="btn-open-nft" onclick="openInAppBrowser('${item.nft_link}')">Открыть NFT</button>
                            <button class="btn-withdraw ${isPending ? 'loading' : ''}" onclick="requestWithdraw('${item.id}')" ${isPending ? 'disabled' : ''}>
                                ${isPending ? '<div class="spinner"></div>' : 'Вывести <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>'}
                            </button>
                        </div>
                    `;
                }).join('');
            }

            // Рендер истории
            if (historyItems.length === 0) {
                historyContainer.innerHTML = '<div style="padding: 100px 20px; text-align: center; color: var(--text-muted); grid-column: span 2; font-size: 0.9rem;">ИСТОРИЯ ПУСТА</div>';
            } else {
                historyContainer.innerHTML = historyItems.map(item => `
                    <div class="item-card" style="opacity: 0.5;">
                        <img src="${item.image_url}" class="item-image" style="filter: grayscale(100%);">
                        <div class="item-name">${item.name}</div>
                        <div class="history-tag">ВЫВЕДЕНО</div>
                    </div>
                `).join('');
            }
        }

        async function requestWithdraw(itemId) {
            if (withdrawPending[itemId]) return; 

            // Блокируем кнопку и показываем крутилку
            withdrawPending[itemId] = true;
            localStorage.setItem('withdrawPending', JSON.stringify(withdrawPending));
            renderInventoryTabs(); 

            try {
                await fetch(`${API_BASE}/request-withdraw`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        itemId: itemId,
                        userId: tg.initDataUnsafe?.user?.id,
                        username: tg.initDataUnsafe?.user?.username
                    })
                });
            } catch(e) { console.error(e); }

            tg.HapticFeedback.notificationOccurred('success');
        }

        // Фоновый поллинг (опрос сервера каждые 5 секунд)
        async function backgroundPoll() {
            const userId = tg.initDataUnsafe?.user?.id;
            if (!userId) return;
            
            // Запрашиваем новые данные, только если мы на странице инвентаря ИЛИ есть предметы в ожидании вывода
            if (document.getElementById('page-inventory').classList.contains('page-active') || Object.keys(withdrawPending).length > 0) {
                 try {
                    const res = await fetch(`${API_BASE}/inventory?user_id=${userId}`);
                    const newData = await res.json();
                    
                    let needsUpdate = false;
                    
                    // Если предмет выведен админом, удаляем его из ожидания
                    newData.forEach(newItem => {
                        if (newItem.status === 'withdrawn' && withdrawPending[newItem.id]) {
                            delete withdrawPending[newItem.id];
                            needsUpdate = true;
                        }
                    });

                    // Если данные изменились (например, статус обновился), сохраняем и перерисовываем
                    if (needsUpdate || JSON.stringify(inventoryItemsData) !== JSON.stringify(newData)) {
                        inventoryItemsData = newData;
                        localStorage.setItem('withdrawPending', JSON.stringify(withdrawPending));
                        
                        if (document.getElementById('page-inventory').classList.contains('page-active')) {
                            renderInventoryTabs();
                        }
                    }
                 } catch (e) {}
            }
        }

        // Запускаем проверку каждые 5 секунд
        setInterval(backgroundPoll, 5000);

        loadCatalog();
        tg.expand();
        tg.ready();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNX STORE — Premium NFT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(45deg, #d4af37, #f4d03f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        #catalog {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 450px;
        }

        .item-card {
            background: linear-gradient(145deg, #1a1a1a, #141414);
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .item-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }

        .item-price-tag {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .item-price-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 15px;
        }

        button {
            background: linear-gradient(45deg, #d4af37, #b8860b);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
            margin-bottom: 10px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>

    <header>
        <h1>DNX Store</h1>
        <div class="subtitle">Exclusive Digital Assets</div>
    </header>

    <div id="catalog">
        <div style="text-align:center; color: #888;">Загрузка товаров из базы...</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Твоя активная ссылка из LocalTunnel
        const API_URL = 'https://cruel-bags-nail.loca.lt/items';

        async function loadItems() {
            const container = document.getElementById('catalog');
            try {
                // Пытаемся получить данные из твоей базы
                const response = await fetch(API_URL);
                const items = await response.json();
                
                if (items.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:#888;">Товаров пока нет</div>';
                    return;
                }

                // Отрисовываем карточки из базы
                container.innerHTML = items.map(item => `
                    <div class="item-card">
                        <div class="status-badge">${item.status || 'Без статуса'}</div>
                        <div class="item-name">${item.name}</div>
                        <div class="item-price-tag">Цена</div>
                        <div class="item-price-value">${item.price} TON</div>
                        <button onclick="buyItem('${item.name}')">Купить сейчас</button>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = '<div style="text-align:center; color:#d4af37;">Не удалось подключиться к базе данных. Проверьте терминал.</div>';
                console.error(e);
            }
        }

        function buyItem(name) {
            tg.sendData("Покупка: " + name); 
            tg.close();
        }

        // Запуск функции при загрузке страницы
        loadItems();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNX STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- ВОССТАНОВЛЕННЫЕ СТИЛИ DNX STORE (ЗОЛОТОЕ СВЕЧЕНИЕ) --- */
        body {
            background-color: #080808;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 80px; 
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 25px 0 15px 0;
            text-align: center;
            position: relative;
            background: #080808;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            color: #fff; 
            /* Тот самый эффект свечения */
            text-shadow: 
                0 0 4px #fff,
                0 0 7px #f4d03f,
                0 0 12px #f4d03f,
                0 0 25px #f4d03f;
        }

        .subtitle { 
            font-size: 0.75rem; 
            color: #888; 
            margin-top: 5px; 
            letter-spacing: 1px; 
            text-transform: uppercase;
        }

        .cart-btn-header {
            position: absolute;
            right: 20px;
            top: 25px;
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .cart-count {
            background: #f4d03f;
            color: #000;
            font-size: 0.75rem;
            padding: 2px 7px;
            border-radius: 50%;
            margin-left: 8px;
            font-weight: bold;
        }

        /* --- СТРАНИЦЫ --- */
        .page { display: none; width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; }
        .page-active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- КАТАЛОГ --- */
        .catalog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .item-card {
            background: #121212;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .item-card:active { transform: scale(0.97); }

        .item-image {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 14px;
            object-fit: cover;
            margin-bottom: 10px;
            background: #1a1a1a;
        }

        .item-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .price-value { color: #f4d03f; font-weight: 700; font-size: 1rem; }

        .btn-add-cart {
            background: #1a1a1a;
            border: 1px solid #f4d03f;
            color: #f4d03f;
            width: 40px;
            height: 35px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- ТАБ-БАР --- */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(17, 17, 17, 0.95);
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .tab-item {
            color: #555;
            font-size: 0.7rem;
            text-align: center;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .tab-item.active { color: #f4d03f; }
        .tab-icon { font-size: 1.2rem; display: block; margin-bottom: 4px; }

        /* --- КОРЗИНА / ОПЛАТА --- */
        .cart-item {
            background: #121212;
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #222;
        }

        .main-btn {
            background: linear-gradient(45deg, #d4af37, #f4d03f);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 15px;
            width: 100%;
            font-weight: 800;
            font-size: 1rem;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .requisites {
            background: #1a1a1a;
            border: 1px dashed #f4d03f;
            padding: 20px;
            color: #f4d03f;
            margin: 20px 0;
            font-family: monospace;
            border-radius: 12px;
            white-space: pre-line;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header id="main-header">
        <h1>DNX Store</h1>
        <div class="subtitle">Exclusive Digital Assets</div>
        <div class="cart-btn-header" onclick="showPage('cart')">
            🛒 <span class="cart-count" id="cart-counter">0</span>
        </div>
    </header>

    <div id="page-catalog" class="page page-active">
        <div id="catalog-list" class="catalog-grid">
            <div style="grid-column: span 2; text-align:center; padding:50px; color:#555;">Загрузка...</div>
        </div>
    </div>

    <div id="page-inventory" class="page">
        <h2 style="text-align:center; font-size:1.2rem; color:#f4d03f;">МОИ АКТИВЫ</h2>
        <div id="inventory-list"></div>
    </div>

    <div id="page-cart" class="page">
        <h2 style="text-align:center; font-size:1.2rem;">КОРЗИНА</h2>
        <div id="cart-items-list"></div>
        <div id="cart-total" style="text-align:right; font-weight:700; font-size:1.3rem; margin:20px 10px; color:#f4d03f;"></div>
        <button class="main-btn" id="btn-pay-cart" onclick="buyCart()">Оплатить заказ</button>
        <button style="background:none; border:none; color:#555; width:100%; margin-top:15px; cursor:pointer;" onclick="showPage('catalog')">Вернуться назад</button>
    </div>

    <div id="page-payment" class="page">
        <div style="background:#111; border:2px solid #d4af37; padding:25px; border-radius:25px; text-align:center;">
            <h3 style="margin-top:0;">Оформление</h3>
            <div id="pay-info" style="font-size:1.1rem; margin-bottom:10px;"></div>
            <div class="requisites" id="pay-requisites"></div>
            <button class="main-btn" onclick="confirmPayment()">Я оплатил</button>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" id="tab-catalog" onclick="showPage('catalog')">
            <span class="tab-icon">🏠</span>МАГАЗИН
        </div>
        <div class="tab-item" id="tab-inventory" onclick="showPage('inventory')">
            <span class="tab-icon">📦</span>ИНВЕНТАРЬ
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#080808';
        
        const API_BASE = 'https://dnx-shop.onrender.com';
        let allItems = [];
        let cart = [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById('page-' + pageId).classList.add('page-active');
            
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            if(pageId === 'catalog') document.getElementById('tab-catalog').classList.add('active');
            if(pageId === 'inventory') {
                document.getElementById('tab-inventory').classList.add('active');
                loadInventory();
            }
            if(pageId === 'cart') renderCart();
        }

        async function loadCatalog() {
            try {
                const res = await fetch(`${API_BASE}/items`);
                allItems = await res.json();
                const container = document.getElementById('catalog-list');
                container.innerHTML = allItems.map(item => `
                    <div class="item-card">
                        <img src="${item.image_url}" class="item-image">
                        <div class="item-name">${item.name}</div>
                        <div class="price-row">
                            <span class="price-value">${Number(item.price).toLocaleString()} ₽</span>
                            <button class="btn-add-cart" onclick="addToCart(${item.id})">🛒+</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        function addToCart(id) {
            const item = allItems.find(i => i.id === id);
            if (!cart.find(i => i.id === id)) {
                cart.push(item);
                tg.HapticFeedback.impactOccurred('medium');
                updateCartCounter();
            } else {
                tg.showAlert("Товар уже в корзине");
            }
        }

        function updateCartCounter() {
            document.getElementById('cart-counter').innerText = cart.length;
        }

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            let total = 0;
            if(cart.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:40px; color:#555;">Корзина пуста</div>';
                document.getElementById('cart-total').innerText = "";
                document.getElementById('btn-pay-cart').style.display = "none";
                return;
            }
            
            document.getElementById('btn-pay-cart').style.display = "block";
            list.innerHTML = cart.map((item, idx) => {
                total += Number(item.price);
                return `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <div>
                            <b style="color:#f4d03f">${Number(item.price).toLocaleString()} ₽</b>
                            <button onclick="removeFromCart(${idx})" style="background:none; border:none; color:#ff4d4d; margin-left:15px; font-size:1.2rem; cursor:pointer;">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = `Итого: ${total.toLocaleString()} ₽`;
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            updateCartCounter();
            renderCart();
        }

        async function buyCart() {
            if(cart.length === 0) return;
            try {
                const res = await fetch(`${API_BASE}/reserve`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        item_ids: cart.map(i => i.id),
                        user_id: tg.initDataUnsafe.user?.id || 0,
                        username: tg.initDataUnsafe.user?.username || 'Guest'
                    })
                });
                const result = await res.json();
                if(result.success) {
                    showPage('payment');
                    document.getElementById('pay-info').innerText = `К оплате: ${document.getElementById('cart-total').innerText}`;
                    document.getElementById('pay-requisites').innerText = result.requisites;
                } else {
                    tg.showAlert(result.error);
                }
            } catch(e) { tg.showAlert("Ошибка сервера"); }
        }

        function confirmPayment() {
            tg.showConfirm("Вы точно совершили оплату?", async (ok) => {
                if(ok) {
                    await fetch(`${API_BASE}/check_payment`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            user_id: tg.initDataUnsafe.user?.id,
                            username: tg.initDataUnsafe.user?.username
                        })
                    });
                    tg.showAlert("Запрос отправлен! Ожидайте подтверждения.");
                    cart = [];
                    updateCartCounter();
                    showPage('catalog');
                }
            });
        }

        async function loadInventory() {
            const container = document.getElementById('inventory-list');
            container.innerHTML = '<div style="text-align:center; padding:20px; color:#555;">Загрузка...</div>';
            try {
                const res = await fetch(`${API_BASE}/inventory?user_id=${tg.initDataUnsafe.user?.id || 0}`);
                const items = await res.json();
                if(items.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:40px; color:#555;">Нет купленных NFT</div>';
                } else {
                    container.innerHTML = items.map(item => `
                        <div class="cart-item">
                            <div style="display:flex; align-items:center;">
                                <img src="${item.image_url}" style="width:45px; height:45px; border-radius:10px; margin-right:15px; object-fit:cover;">
                                <span>${item.name}</span>
                            </div>
                            <button onclick="window.open('${item.nft_link}')" style="background:#f4d03f; color:#000; border:none; padding:8px 12px; border-radius:8px; font-weight:bold; font-size:0.7rem; cursor:pointer;">ОТКРЫТЬ</button>
                        </div>
                    `).join('');
                }
            } catch (e) { container.innerHTML = "Ошибка загрузки"; }
        }

        loadCatalog();
    </script>
</body>
</html>

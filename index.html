<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNX STORE INTERFACE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
    body {
        background-color: #f5f5f5; /* Фон ноутбука для контекста */
        font-family: 'Inter', sans-serif;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        /* Улучшенное сглаживание шрифтов */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    .dnx-modal {
        width: 380px;
        background-color: #0c0d12;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        display: flex;
        flex-direction: column;
    }

    .dnx-header {
        background-color: #f6f3f0;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #ddd;
    }

    .header-title {
        color: #7d333e;
        font-weight: 600;
        font-size: 16px;
        margin: 0;
    }

    .header-icons {
        color: #555;
        font-size: 20px;
        display: flex;
        gap: 12px;
        cursor: pointer;
    }

    .dnx-main {
        padding: 24px;
        flex-grow: 1;
    }

    .store-title {
        font-weight: 900;
        font-size: 24px;
        color: #fff;
        text-transform: uppercase;
        margin-bottom: 8px;
        letter-spacing: 1px;
        text-align: center;
        /* УВЕЛИЧЕННОЕ СВЕЧЕНИЕ СБОКУ */
        text-shadow: 
            0 0 10px rgba(244, 208, 63, 0.9), 
            0 0 30px rgba(244, 208, 63, 0.6);
    }

    .exclusive-sub {
        font-weight: 400;
        font-size: 12px;
        color: #888;
        text-transform: uppercase;
        margin-bottom: 24px;
        letter-spacing: 1.5px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
    }

    .cart-counter {
        color: #f4d03f;
        font-weight: 700;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .item-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
    }

    .card {
        background-color: #0c0d12;
        border-radius: 16px;
        padding: 16px;
        display: flex;
        flex-direction: column;
    }

    .card-image-box {
        aspect-ratio: 1/1;
        border-radius: 12px;
        margin-bottom: 16px;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden; /* Чтобы текст ID не вылезал */
    }

    .card-green {
        background-color: #2e3e2d;
    }

    .card-red {
        background-color: #5d343c;
    }

    .card-image {
        width: 80%;
        height: auto;
    }

    .card-id {
        position: absolute;
        bottom: 8px;
        left: 8px;
        color: #ddd;
        font-size: 10px;
        background: rgba(0,0,0,0.6);
        padding: 4px 8px;
        border-radius: 4px;
        white-space: pre-line;
    }

    .card-title {
        font-weight: 700;
        font-size: 14px;
        color: #fff;
        margin-bottom: 12px;
        /* Ключ к исправлению: Разрешаем текст в две строки */
        white-space: pre-line;
        min-height: 2.8em; /* Чтобы цена не прыгала */
    }

    .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: auto; /* Прижимает к низу */
    }

    .price-btn {
        background-color: #f4d03f;
        color: #000;
        font-weight: 700;
        font-size: 12px;
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    .cart-icon-btn {
        color: #f4d03f;
        font-size: 16px;
        border: 1.5px solid #f4d03f;
        border-radius: 6px;
        padding: 6px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        background: none;
    }

    .dnx-footer {
        background-color: #0c0d12;
        border-top: 1px solid #1a1a1a;
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .tab-bar {
        display: flex;
        justify-content: space-around;
        width: 100%;
        margin-bottom: 12px;
    }

    .tab {
        font-weight: 700;
        font-size: 14px;
        color: #888;
        text-transform: uppercase;
        cursor: pointer;
    }

    .tab-active {
        color: #f4d03f;
    }

    .bot-link {
        font-weight: 400;
        font-size: 12px;
        color: #777;
        text-align: center;
        display: block;
        margin-top: 12px;
        text-decoration: none;
    }
</style>
</head>
<body>

<div class="dnx-modal">
    <div class="dnx-header">
        <h2 class="header-title">DnxStore</h2>
        <div class="header-icons">
            <span>&#8942;</span> <span>&#10005;</span> </div>
    </div>
    
    <div class="dnx-main">
        <h1 class="store-title">DNX STORE</h1>
        <div class="exclusive-sub">
            EXCLUSIVE DIGITAL ASSETS
            <div class="cart-counter">&#128722; 0</div> </div>
        
        <div class="item-grid">
            <div class="card">
                <div class="card-image-box card-green">
                    <svg viewBox="0 0 100 100" class="card-image" style="fill: #fff;"><circle cx="50" cy="50" r="40"/><path d="M50 10l5 15h15l-12 9 5 15-13-10-13 10 5-15-12-9h15z"/></svg>
                    <div class="card-id">Hypno Lollipop #6833<br>Kawaii Dog</div>
                </div>
                <div class="card-title">NFT<br>Golden Star</div>
                <div class="card-footer">
                    <button class="price-btn">1500 ₽</button>
                    <button class="cart-icon-btn">&#128722;</button> </div>
            </div>
            
            <div class="card">
                <div class="card-image-box card-red">
                    <svg viewBox="0 0 100 100" class="card-image" style="fill: #fff;"><circle cx="50" cy="50" r="40"/><path d="M50 10l5 15h15l-12 9 5 15-13-10-13 10 5-15-12-9h15z"/></svg>
                    <div class="card-id">Hypno Lollipop #61376<br>Kawaii Dog</div>
                </div>
                <div class="card-title">NFT<br>Blue Rabbit</div>
                <div class="card-footer">
                    <button class="price-btn">500 ₽</button>
                    <button class="cart-icon-btn">&#128722;</button> </div>
            </div>
        </div>
    </div>
    
    <div class="dnx-footer">
        <div class="tab-bar">
            <div class="tab tab-active">МАГАЗИН</div>
            <div class="tab">ИНВЕНТАРЬ</div>
        </div>
        <a href="#" class="bot-link">@dnxstore_bot</a>
    </div>
</div>

</body>
</html>

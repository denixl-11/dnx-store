<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DNX STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* ФИКС 1: box-sizing: border-box для всех элементов убирает вылеты за края и черные полосы */
        * { box-sizing: border-box; }

        body { 
            background-color: #080808; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding-bottom: 100px; 
            overflow-x: hidden; /* Запрещаем горизонтальный скролл */
            -webkit-font-smoothing: antialiased; 
        }

        header { width: 100%; padding: 40px 15px 20px 15px; text-align: center; position: relative; }
        h1 { font-weight: 650; font-size: 1.85rem; text-transform: uppercase; margin: 0; letter-spacing: 1px; color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2), 0 0 25px rgba(244, 208, 63, 0.8); }
        .subtitle { font-size: 0.6rem; color: #888; margin-top: 5px; letter-spacing: 2px; text-transform: uppercase; }
        
        .cart-btn-header { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; background: rgba(25, 25, 25, 0.9); border: 1px solid #333; padding: 5px 12px; border-radius: 8px; cursor: pointer; }
        #cart-counter { color: #f4d03f; font-weight: 500; margin-left: 6px; font-size: 0.9rem; }

        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; padding: 10px 15px; }
        .item-card { background: #111; border: 1px solid #1a1a1a; border-radius: 22px; padding: 12px; display: flex; flex-direction: column; width: 100%; }
        .item-image { width: 100%; aspect-ratio: 1/1; border-radius: 16px; object-fit: cover; margin-bottom: 12px; }
        .item-name { font-size: 1.05rem; font-weight: 600; margin-bottom: 12px; color: #fff; text-align: justify; text-align-last: justify; }
        
        .card-buttons { display: flex; width: 100%; gap: 6px; }
        .btn-buy-now { flex: 4; background: #f4d03f; color: #000; border: none; border-radius: 8px; height: 32px; font-weight: 900; font-size: 0.85rem; cursor: pointer; }
        .btn-add-cart { flex: 1.2; background: #000; border: 1.5px solid #f4d03f; border-radius: 8px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .btn-tg-link-full { width: 100%; background: #000; border: 1.5px solid #f4d03f; border-radius: 8px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-top: 6px; }
        
        .page { display: none; width: 100%; }
        .page-active { display: block; }
        
        /* Таббар */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-around; padding: 20px 0; z-index: 100; }
        .tab-item { color: #444; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .tab-item.active { color: #f4d03f; }

        /* Оплата */
        .payment-box { background: #111; padding: 20px; border-radius: 16px; border: 1px solid #1a1a1a; margin: 20px 15px; }
        .btn-main-action { width: calc(100% - 30px); margin: 0 15px; background: #f4d03f; color: #000; border: none; border-radius: 12px; height: 50px; font-weight: 900; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>DNX STORE</h1>
        <div class="subtitle">Exclusive Digital Assets</div>
        <div class="cart-btn-header" onclick="showPage('cart')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
            <span id="cart-counter">0</span>
        </div>
    </header>

    <div id="page-store" class="page page-active">
        <div class="catalog-grid" id="catalog-list"></div>
    </div>

    <div id="page-cart" class="page">
        <div id="cart-items-list"></div>
        <button class="btn-main-action" id="pay-footer" style="display: none; margin-top: 20px;" onclick="goToPayment('cart')">Перейти к оплате</button>
    </div>

    <div id="page-payment" class="page">
        <div class="payment-box">
            <div id="payment-amount" style="font-size: 1.8rem; font-weight: 900; text-align: center;">0 ₽</div>
            <input type="text" id="req-card" style="width:100%; background:#000; color:#fff; border:1px solid #333; padding:10px; margin-top:15px; border-radius:8px;" value="1111 2222 3333 4444" readonly>
        </div>
        <button class="btn-main-action" onclick="checkPayment()">Проверить оплату</button>
        <button style="width:100%; background:none; border:none; color:#555; margin-top:15px;" onclick="cancelPayment()">Отмена</button>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" id="tab-store" onclick="showPage('store')">МАГАЗИН</div>
        <div class="tab-item" id="tab-inventory" onclick="showPage('inventory')">ИНВЕНТАРЬ</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = 'https://dnx-shop.onrender.com';
        let cart = [];
        let currentBookingIds = [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById('page-' + pageId).classList.add('page-active');
            tg.HapticFeedback.impactOccurred('light');
        }

        // ФИКС 3: Улучшенное открытие ссылок для ПК и мобилок
        function openInAppBrowser(url) {
            if (!url) return;
            try {
                // Пытаемся открыть через встроенный браузер без закрытия Mini App
                tg.openLink(url, { try_instant_view: true });
            } catch (e) {
                // Фолбек если метод не сработал
                window.open(url, '_blank');
            }
        }

        async function loadCatalog() {
            try {
                const res = await fetch(`${API_BASE}/items`);
                const items = await res.json();
                document.getElementById('catalog-list').innerHTML = items.map(item => `
                    <div class="item-card">
                        <img src="${item.image_url}" class="item-image">
                        <div class="item-name">${item.name}</div>
                        <div class="card-buttons">
                            <button class="btn-buy-now" onclick="goToPayment('item', '${item.id}', ${item.price})">${item.price} ₽</button>
                            <button class="btn-add-cart" onclick='addToCart(${JSON.stringify(item)})'>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f4d03f" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
                            </button>
                        </div>
                        <button class="btn-tg-link-full" onclick="openInAppBrowser('${item.nft_link}')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="#f4d03f"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.06-.2-.07-.06-.17-.04-.25-.02-.11.02-1.83 1.16-5.16 3.41-.48.33-.92.5-1.32.49-.44-.01-1.28-.24-1.9-.44-.76-.25-1.36-.38-1.3-.8.03-.22.33-.45.9-.68 3.55-1.54 5.92-2.57 7.11-3.06 3.39-1.4 4.1-1.65 4.56-1.66.11 0 .33.03.47.14.12.1.15.24.16.35-.01.06-.01.17-.02.28z"/></svg>
                        </button>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        // ФИКС 2: Исправленная логика бронирования
        async function goToPayment(type, itemId = null, price = 0) {
            currentBookingIds = []; // Сбрасываем старые ID

            if (type === 'cart') {
                currentBookingIds = cart.map(item => item.id);
                document.getElementById('payment-amount').innerText = cart.reduce((sum, i) => sum + parseInt(i.price), 0) + ' ₽';
            } else {
                currentBookingIds = [itemId]; // Передаем ID как элемент массива
                document.getElementById('payment-amount').innerText = price + ' ₽';
            }

            try {
                const response = await fetch(`${API_BASE}/book`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items: currentBookingIds,
                        userId: tg.initDataUnsafe?.user?.id
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    showPage('payment');
                } else {
                    tg.showAlert('Ошибка: этот товар уже забронирован другим покупателем.');
                }
            } catch (e) {
                tg.showAlert('Сервер недоступен, попробуйте позже.');
            }
        }

        async function cancelPayment() {
            await fetch(`${API_BASE}/cancel-booking`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: currentBookingIds })
            });
            showPage('store');
        }

        function addToCart(item) {
            cart.push(item);
            document.getElementById('cart-counter').innerText = cart.length;
            tg.HapticFeedback.notificationOccurred('success');
        }

        loadCatalog();
        tg.expand();
        tg.ready();
    </script>
</body>
</html>

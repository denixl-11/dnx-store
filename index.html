<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNX STORE — Premium NFT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- ОБНОВЛЕННЫЕ СТИЛИ ЗАГОЛОВКА (БЕЗ ДЫХАНИЯ, УМЕНЬШЕННАЯ ЯРКОСТЬ) --- */
        body {
            background-color: #080808;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 10px;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            /* Белый цвет текста для эффекта раскаленной нити неона */
            color: #fff; 
            /* Статичное мощное свечение (радиусы уменьшены для снижения яркости) */
            text-shadow: 
                0 0 5px #fff,
                0 0 8px #f4d03f,
                0 0 18px #f4d03f,
                0 0 35px #f4d03f,
                0 0 70px #f4d03f,
                0 0 80px #f4d03f;
            /* Анимация удалена */
        }

        .subtitle { font-size: 0.75rem; color: #888; margin-top: 5px; letter-spacing: 1px; }

        /* --- КАТАЛОГ --- */
        #catalog {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        .item-card {
            background: #121212;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 10px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .item-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 14px;
            margin-bottom: 10px;
            background: #1a1a1a;
        }

        .status-badge {
            position: absolute;
            top: 18px;
            left: 18px;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.55rem;
            font-weight: 700;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            z-index: 2;
        }

        .status-available { background: rgba(0, 255, 100, 0.12); color: rgba(0, 255, 100, 0.8); }
        .status-sold { background: rgba(255, 50, 50, 0.15); color: rgba(255, 157, 157, 0.8); }
        .status-booked { background: rgba(212, 175, 55, 0.15); color: rgba(244, 208, 63, 0.8); }

        .item-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 4px; }
        .item-price-value { font-size: 1rem; font-weight: 700; color: #f4d03f; margin-bottom: 10px; }

        button {
            background: linear-gradient(45deg, #d4af37, #f4d03f);
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 10px;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
        }

        /* --- УВЕДОМЛЕНИЯ --- */
        .notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 300px;
            padding: 15px;
            border-radius: 15px;
            color: white;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 700;
            z-index: 10001;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .notif-success { background: #28a745; border: 1px solid #34ce57; }
        .notif-error { background: #dc3545; border: 1px solid #f8d7da; }
        .notif-show { top: 20px; }

        /* --- ЭКРАН ОПЛАТЫ --- */
        #payment-screen { display: none; width: 100%; max-width: 400px; text-align: center; }
        .pay-card {
            background: #111;
            border: 2px solid #d4af37;
            border-radius: 25px;
            padding: 25px;
            margin-top: 20px;
        }
        .requisites-container {
            background: #1a1a1a;
            border: 1px dashed #d4af37;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 0.85rem;
            color: #f4d03f;
            white-space: pre-line;
        }
        .btn-check:disabled { background: #222 !important; color: #555 !important; }
        .close-hint { font-size: 0.65rem; color: #444; margin-top: 12px; display: none; }
        
        #image-viewer {
            display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(10px); justify-content: center; align-items: center;
        }
        #full-image { max-width: 90%; max-height: 80%; border-radius: 15px; }
    </style>
</head>
<body>

    <header id="main-header">
        <h1>DNX Store</h1>
        <div class="subtitle">Exclusive Digital Assets</div>
    </header>

    <div id="catalog">
        <div style="grid-column: span 2; text-align:center; color: #666; padding: 40px;">Загрузка активов...</div>
    </div>

    <div id="payment-screen">
        <div class="pay-card">
            <div class="pay-title" style="color:#d4af37; font-weight:700; margin-bottom:15px;">Оформление заказа</div>
            <div id="pay-name">---</div>
            <div id="pay-price" style="color: #d4af37; font-size: 1.1rem; margin-top:10px;">---</div>
            
            <div class="requisites-container" id="pay-requisites">Загрузка...</div>

            <button class="btn-check" id="btn-check-pay" onclick="checkPayment()">Проверить оплату</button>
            <div id="close-hint" class="close-hint">Вы можете закрыть окно, пока идет проверка транзакции</div>
        </div>
        <button style="background:none; color:#555; border:1px solid #333; margin-top:15px;" onclick="window.location.reload()">Вернуться в каталог</button>
    </div>

    <div id="image-viewer" onclick="closeImage()">
        <img id="full-image" src="">
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#080808';

        const API_BASE = 'https://dnx-shop.onrender.com';
        let currentPendingItemId = null;
        let isPolling = false;

        function showStatusNotif(text, type) {
            const notif = document.createElement('div');
            notif.className = `notification ${type === 'success' ? 'notif-success' : 'notif-error'}`;
            notif.innerText = text;
            document.body.appendChild(notif);
            
            setTimeout(() => notif.classList.add('notif-show'), 100);
            
            setTimeout(() => {
                notif.classList.remove('notif-show');
                setTimeout(() => notif.remove(), 500);
            }, 5000);
        }

        async function startStatusPolling() {
            if (isPolling) return;
            isPolling = true;

            const pollInterval = setInterval(async () => {
                const userId = tg.initDataUnsafe.user?.id;
                if (!userId) return;

                try {
                    const response = await fetch(`${API_BASE}/get_status?user_id=${userId}`);
                    const data = await response.json();

                    if (data.last_event === 'approved') {
                        showStatusNotif("Успешная покупка!", "success");
                        tg.HapticFeedback.notificationOccurred('success');
                        await clearServerEvent(userId);
                        setTimeout(() => window.location.reload(), 3000);
                    } 
                    else if (data.last_event === 'rejected') {
                        showStatusNotif("Платеж не выполнен, товар возвращен в каталог", "error");
                        tg.HapticFeedback.notificationOccurred('error');
                        await clearServerEvent(userId);
                        setTimeout(() => window.location.reload(), 3000);
                    }
                } catch (e) { console.error("Polling error", e); }
            }, 4000);
        }

        async function clearServerEvent(userId) {
            await fetch(`${API_BASE}/clear_event`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId })
            });
        }

        function openImage(event, url) {
            event.stopPropagation();
            document.getElementById('full-image').src = url;
            document.getElementById('image-viewer').style.display = 'flex';
        }

        function closeImage() { document.getElementById('image-viewer').style.display = 'none'; }

        async function loadItems() {
            const container = document.getElementById('catalog');
            try {
                const response = await fetch(`${API_BASE}/items`);
                const items = await response.json();
                
                container.innerHTML = items.map(item => {
                    let statusClass = 'status-available';
                    let statusText = item.status || 'В наличии';
                    let isAvailable = (item.status === 'Доступен' || !item.status);
                    
                    if (item.status === 'Продан') statusClass = 'status-sold';
                    else if (item.status === 'Забронирован') statusClass = 'status-booked';

                    const imgUrl = item.image_url || 'https://via.placeholder.com/400x400?text=NFT';

                    return `
                        <div class="item-card" onclick="openImage(event, '${imgUrl}')">
                            <img src="${imgUrl}" class="item-image">
                            <div class="status-badge ${statusClass}">${statusText}</div>
                            <div class="item-info">
                                <div class="item-name">${item.name}</div>
                                <div class="item-price-value">${Number(item.price).toLocaleString()} ₽</div>
                                ${isAvailable ? 
                                    `<button onclick="buyItem(event, ${item.id}, '${item.name}', '${item.price}')">Купить</button>` : 
                                    `<button style="background: #222; color: #555; cursor: default;" onclick="event.stopPropagation()">Недоступен</button>`
                                }
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) { container.innerHTML = 'Ошибка связи'; }
        }

        async function buyItem(event, id, name, price) {
            event.stopPropagation();
            tg.HapticFeedback.impactOccurred('medium');
            try {
                const response = await fetch(`${API_BASE}/reserve`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        item_id: id,
                        user_id: tg.initDataUnsafe.user?.id || 0,
                        username: tg.initDataUnsafe.user?.username || 'Guest'
                    })
                });
                const result = await response.json();
                if (result.success) {
                    currentPendingItemId = id;
                    document.getElementById('catalog').style.display = 'none';
                    document.getElementById('main-header').style.display = 'none';
                    document.getElementById('payment-screen').style.display = 'block';
                    document.getElementById('pay-name').innerText = name;
                    document.getElementById('pay-price').innerText = Number(price).toLocaleString() + ' ₽';
                    document.getElementById('pay-requisites').innerText = result.requisites;
                } else { tg.showAlert(result.error); }
            } catch (e) { tg.showAlert("Ошибка сервера"); }
        }

        async function checkPayment() {
            if (!currentPendingItemId) return;
            tg.showConfirm("Вы точно совершили оплату?", async (confirmed) => {
                if (confirmed) {
                    const btn = document.getElementById('btn-check-pay');
                    btn.disabled = true;
                    btn.innerText = "Ожидайте подтверждения...";
                    document.getElementById('close-hint').style.display = 'block';
                    
                    await fetch(`${API_BASE}/check_payment`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            item_id: currentPendingItemId,
                            user_id: tg.initDataUnsafe.user?.id,
                            username: tg.initDataUnsafe.user?.username
                        })
                    });
                }
            });
        }

        loadItems();
        startStatusPolling();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNX STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #080808;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* --- БЛАГОРОДНЫЙ ЗАГОЛОВОК --- */
        header {
            width: 100%;
            padding: 35px 0 15px 0;
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 1.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            color: #fff;
            font-weight: 700; /* Благородная жирность */
            /* Среднее свечение: заметное, но не слепящее */
            text-shadow: 
                0 0 5px rgba(255, 255, 255, 0.4),
                0 0 10px rgba(212, 175, 55, 0.6),
                0 0 20px rgba(212, 175, 55, 0.2);
        }

        .subtitle {
            font-size: 0.6rem;
            color: #666;
            margin-top: 6px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .cart-btn-header {
            position: absolute;
            right: 20px;
            top: 70px; /* Позиция в выделенной зоне */
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            padding: 5px 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .cart-count { color: #f4d03f; font-size: 0.7rem; margin-left: 5px; font-weight: 700; }

        /* --- КАРТОЧКИ И ПРОДОЛЬНЫЕ КНОПКИ --- */
        .catalog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            padding: 10px 15px;
            box-sizing: border-box;
        }

        .item-card {
            background: #111;
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .item-image {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 14px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .item-name {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #bbb;
            padding: 0 4px;
        }

        /* Контейнер кнопок 3/4 и 1/4 */
        .card-buttons {
            display: flex;
            width: 100%;
            gap: 6px;
            margin-top: auto;
        }

        .btn-buy-now {
            flex: 3; /* 75% ширины */
            background: linear-gradient(180deg, #f4d03f, #d4af37);
            color: #000;
            border: none;
            border-radius: 7px;
            padding: 8px 0;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-add-cart {
            flex: 1; /* 25% ширины */
            background: #000;
            border: 1px solid #d4af37;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-icon-svg { width: 14px; height: 14px; fill: none; stroke: #d4af37; stroke-width: 2.5; }

        /* --- НИЖНЯЯ ПАНЕЛЬ --- */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #080808;
            border-top: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
            z-index: 1000;
        }

        .tab-item { color: #333; font-size: 0.65rem; font-weight: 700; cursor: pointer; letter-spacing: 1px; }
        .tab-item.active { color: #f4d03f; }

        .page { display: none; width: 100%; }
        .page-active { display: block; }
    </style>
</head>
<body>

    <header>
        <h1>DNX Store</h1>
        <div class="subtitle">Exclusive Digital Assets</div>
        <div class="cart-btn-header" onclick="showPage('cart')">
            <svg style="width:14px; height:14px; fill:none; stroke:#fff; stroke-width:2;" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
            <span class="cart-count" id="cart-counter">0</span>
        </div>
    </header>

    <div id="page-catalog" class="page page-active">
        <div id="catalog-list" class="catalog-grid">
            </div>
    </div>

    <div id="page-cart" class="page" style="padding: 20px;">
        <h2 style="text-align:center; font-size: 1rem;">ОФОРМЛЕНИЕ</h2>
        <div id="cart-items-list"></div>
        <div id="cart-total" style="text-align:right; font-weight:700; font-size:1.1rem; color:#f4d03f; margin: 15px 0;"></div>
        <button onclick="buyCart()" style="width:100%; background:#f4d03f; color:#000; border:none; padding:15px; border-radius:10px; font-weight:700;">КУПИТЬ</button>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" id="tab-catalog" onclick="showPage('catalog')">МАГАЗИН</div>
        <div class="tab-item" id="tab-inventory" onclick="showPage('inventory')">ИНВЕНТАРЬ</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = 'https://dnx-shop.onrender.com';
        let cart = [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById('page-' + pageId).classList.add('page-active');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + pageId)?.classList.add('active');
        }

        async function loadCatalog() {
            try {
                const res = await fetch(`${API_BASE}/items`);
                const items = await res.json();
                document.getElementById('catalog-list').innerHTML = items.map(item => `
                    <div class="item-card">
                        <img src="${item.image_url}" class="item-image">
                        <div class="item-name">${item.name}</div>
                        <div class="card-buttons">
                            <button class="btn-buy-now" onclick="buyNow(${item.id})">${item.price} ₽</button>
                            <button class="btn-add-cart" onclick="addToCart(${item.id})">
                                <svg class="btn-icon-svg" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        function addToCart(id) {
            if(!cart.includes(id)) {
                cart.push(id);
                document.getElementById('cart-counter').innerText = cart.length;
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        function buyNow(id) {
            cart = [id];
            showPage('cart');
        }

        loadCatalog();
    </script>
</body>
</html>

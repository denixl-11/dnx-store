<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DNX STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-card: linear-gradient(145deg, #131315 0%, #0d0d0f 100%);
            --accent-gold: #cba153;
            --text-main: #e8e8e8;
            --text-muted: #7a7a7c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding-bottom: 80px; -webkit-tap-highlight-color: transparent; }

        /* Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; position: sticky; top: 0; background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(10px); z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .header-title { font-weight: 800; font-size: 20px; letter-spacing: 1px; color: var(--text-main); }
        .header-balance { background: rgba(203, 161, 83, 0.1); padding: 8px 15px; border-radius: 20px; color: var(--accent-gold); font-weight: 600; }

        /* Navigation */
        .nav {
            position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around;
            background: #131315; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        .nav-item { color: var(--text-muted); font-size: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent-gold); }
        .nav-icon { font-size: 24px; margin-bottom: 5px; display: block; }

        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid */
        .items-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .item-card {
            background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;
        }
        .item-img { width: 100%; height: 140px; object-fit: cover; }
        .item-details { padding: 12px; display: flex; flex-direction: column; flex-grow: 1; }
        .item-name { font-weight: 600; font-size: 14px; margin-bottom: 5px; }
        .item-price { color: var(--accent-gold); font-weight: 800; font-size: 16px; margin-bottom: 10px; }
        .buy-btn {
            margin-top: auto; background: rgba(203, 161, 83, 0.1); color: var(--accent-gold);
            border: none; padding: 10px; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer;
        }

        /* Cart */
        .cart-summary { background: var(--bg-card); padding: 20px; border-radius: 16px; margin-top: 20px; font-size: 18px; font-weight: 600; border: 1px solid rgba(255,255,255,0.05); }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #131315; width: 90%; max-width: 350px; border-radius: 24px;
            padding: 25px; position: relative; border: 1px solid rgba(255,255,255,0.1);
        }
        .close-modal {
            position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1);
            border: none; color: white; width: 30px; height: 30px; border-radius: 50%; font-size: 16px;
        }
        .modal-img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; }
        .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
        .modal-desc { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; line-height: 1.5; }

        /* Profile & Withdraw */
        .profile-card { background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .input-field { width: 100%; background: #0a0a0c; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 10px; margin-top: 10px; }

        /* Game Styles */
        .game-card { background: var(--bg-card); padding: 20px; border-radius: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .roulette-wheel { font-size: 60px; margin: 20px 0; display: inline-block; }
        .spin-anim { animation: spin 0.5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .game-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; font-size: 16px; margin-bottom: 10px; color: white; }
        .game-btn-red { background: #e63946; }
        .game-btn-black { background: #1a1a1d; border: 1px solid #333; }
        .game-btn-green { background: #2a9d8f; }

        .empty-text { text-align: center; color: var(--text-muted); margin-top: 50px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title"></div> <div class="header-balance"><span id="user-balance">0.00</span> ₽</div>
    </div>

    <div id="page-catalog" class="page active">
        <div class="items-grid" id="catalog-grid"></div>
    </div>

    <div id="page-cart" class="page">
        <div id="cart-list"></div>
        <div class="cart-summary">
            <div>Итого: <span id="cart-total" style="color:var(--accent-gold);">0.00</span> ₽</div>
            <button class="buy-btn" onclick="checkout()" style="width:100%; margin-top:15px; padding:15px; font-size:16px;">Оплатить все</button>
        </div>
    </div>

    <div id="page-game" class="page">
        <div class="game-card">
            <h2 style="margin-bottom: 10px;">Рулетка DNX</h2>
            <div style="color: var(--text-muted); font-size: 14px; margin-bottom: 15px;">Ставка: 100 ₽</div>

            <div id="roulette-display" class="roulette-wheel">🎲</div>
            <div id="game-status" style="font-weight: 600; color: var(--accent-gold); height: 24px;">Выберите цвет</div>
        </div>

        <div class="game-controls">
            <button class="game-btn game-btn-red" onclick="openBetConfirm('red')">Ставка на Красное (2x)</button>
            <button class="game-btn game-btn-black" onclick="openBetConfirm('black')">Ставка на Черное (2x)</button>
            <button class="game-btn game-btn-green" onclick="openBetConfirm('green')">Ставка на Зеленое (14x)</button>

            <button class="game-btn" style="background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold); margin-top: 15px;" onclick="return false;">Изменить ставку</button>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="profile-card">
            <h3 style="margin-bottom: 15px;">Пополнение баланса</h3>
            <input type="number" id="topup-amount" class="input-field" placeholder="Сумма (₽)">
            <button class="buy-btn" style="width:100%; margin-top:15px; padding:15px;" onclick="requestTopup()">Пополнить</button>
        </div>

        <h3 style="margin: 20px 0 15px;">Ваш Инвентарь</h3>
        <div class="items-grid" id="inventory-grid"></div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="switchPage('catalog', this)">
            <span class="nav-icon">🛍️</span> Каталог
        </div>
        <div class="nav-item" onclick="switchPage('cart', this)">
            <span class="nav-icon">🛒</span> Корзина (<span id="cart-count">0</span>)
        </div>
        <div class="nav-item" onclick="switchPage('game', this)">
            <span class="nav-icon">🎮</span> Игра
        </div>
        <div class="nav-item" onclick="switchPage('profile', this)">
            <span class="nav-icon">👤</span> Профиль
        </div>
    </div>

    <div class="modal-overlay" id="item-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('item-modal')">✕</button>
            <img id="modal-img" src="" class="modal-img">
            <div id="modal-title" class="modal-title"></div>
            <div id="modal-desc" class="modal-desc"></div>
            <button id="modal-btn" class="buy-btn" style="width:100%; padding:15px; font-size:16px;"></button>
        </div>
    </div>

    <div class="modal-overlay" id="inv-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('inv-modal')">✕</button>
            <img id="inv-modal-img" src="" class="modal-img">
            <div id="inv-modal-title" class="modal-title"></div>
            <p style="color:var(--text-muted); font-size:14px; margin-bottom: 15px;">Для вывода предмета нажмите кнопку ниже. Администратор свяжется с вами.</p>
            <button id="inv-modal-withdraw-btn" class="buy-btn" style="width:100%; padding:15px; font-size:16px; background:#e63946; color:white;">Вывести</button>
        </div>
    </div>

    <div class="modal-overlay" id="bet-modal">
        <div class="modal-content" style="text-align: center;">
            <button class="close-modal" onclick="closeModal('bet-modal')">✕</button>
            <h3 style="margin-bottom: 15px;">Подтверждение</h3>
            <p style="margin-bottom: 20px; color: var(--text-muted);">Вы ставите <b style="color: white;">100 ₽</b> на <b id="bet-color-text" style="color: var(--accent-gold);">Цвет</b>.</p>
            <button class="buy-btn" style="width:100%; padding:15px; font-size:16px;" onclick="placeBet()">Подтвердить ставку</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = 'https://denixl-store-44.onrender.com';

        const uId = tg.initDataUnsafe?.user?.id || 12345;
        const uName = tg.initDataUnsafe?.user?.username || 'TestUser';

        let catalogItems = [];
        let inventoryItems = [];
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let currentItem = null;
        let selectedBetColor = '';

        function updateCartCount() {
            document.getElementById('cart-count').innerText = cart.length;
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        async function updateBalance() {
            try {
                const res = await fetch(`${API_BASE}/user?user_id=${uId}&username=${uName}`);
                const data = await res.json();
                document.getElementById('user-balance').innerText = parseFloat(data.balance).toFixed(2);
            } catch (e) {
                console.error("Balance error:", e);
            }
        }

        function switchPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            el.classList.add('active');

            if(pageId === 'cart') loadCart();
            if(pageId === 'profile') loadInventory();
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        async function loadCatalog() {
            try {
                const res = await fetch(`${API_BASE}/items`);
                catalogItems = await res.json();
                const grid = document.getElementById('catalog-grid');
                grid.innerHTML = '';

                catalogItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'item-card';
                    div.innerHTML = `
                        <img src="${item.image_url}" class="item-img" alt="" onclick="showItemModal(${item.id})">
                        <div class="item-details">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">${parseFloat(item.price).toFixed(2)} ₽</div>
                            <button class="buy-btn" onclick="addToCart(${item.id})">В корзину</button>
                        </div>
                    `;
                    grid.appendChild(div);
                });
            } catch (e) {
                document.getElementById('catalog-grid').innerHTML = '<div class="empty-text">Ошибка загрузки товаров</div>';
            }
        }

        function showItemModal(id) {
            currentItem = catalogItems.find(i => i.id === id);
            if(!currentItem) return;

            document.getElementById('modal-img').src = currentItem.image_url;
            document.getElementById('modal-title').innerText = currentItem.name;
            document.getElementById('modal-desc').innerText = currentItem.description || 'Описание отсутствует.';

            const btn = document.getElementById('modal-btn');
            btn.innerText = `Добавить за ${parseFloat(currentItem.price).toFixed(2)} ₽`;
            btn.onclick = () => {
                addToCart(currentItem.id);
                closeModal('item-modal');
            };

            document.getElementById('item-modal').classList.add('active');
        }

        function addToCart(id) {
            const item = catalogItems.find(i => i.id === id);
            if(item) {
                cart.push(item);
                updateCartCount();
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        // Обновленная функция отрисовки корзины (сеткой)
        function loadCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = '';
            let total = 0;

            if(cart.length === 0) {
                list.className = ''; // Убираем сетку для центрирования пустого текста
                list.innerHTML = '<div class="empty-text">Корзина пуста</div>';
                document.getElementById('cart-total').innerText = '0.00';
                return;
            }

            list.className = 'items-grid'; // Добавляем сетку

            cart.forEach((item, index) => {
                total += item.price;
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `
                    <img src="${item.image_url}" class="item-img" alt="" onclick="showItemModal(${item.id})" style="cursor: pointer;">
                    <div class="item-details">
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">${parseFloat(item.price).toFixed(2)} ₽</div>
                        <button class="buy-btn" style="background: rgba(255, 59, 48, 0.1); color: #ff3b30;" onclick="removeFromCart(${index})">Убрать</button>
                    </div>
                `;
                list.appendChild(div);
            });
            document.getElementById('cart-total').innerText = total.toFixed(2);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartCount();
            loadCart();
        }

        async function checkout() {
            if(cart.length === 0) return alert("Корзина пуста");

            const total = cart.reduce((sum, item) => sum + item.price, 0);

            try {
                const res = await fetch(`${API_BASE}/buy`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: uId, items: cart.map(i => i.id), total_price: total })
                });
                const data = await res.json();

                if(data.success) {
                    cart = [];
                    updateCartCount();
                    loadCart();
                    updateBalance();
                    tg.showAlert("Покупка успешна! Предметы добавлены в инвентарь.");
                } else {
                    tg.showAlert("Ошибка: " + data.error);
                }
            } catch(e) {
                alert("Ошибка сети");
            }
        }

        async function loadInventory() {
            try {
                const res = await fetch(`${API_BASE}/inventory?user_id=${uId}`);
                inventoryItems = await res.json();
                const grid = document.getElementById('inventory-grid');
                grid.innerHTML = '';

                if(inventoryItems.length === 0) {
                    grid.innerHTML = '<div class="empty-text" style="grid-column: span 2;">Инвентарь пуст</div>';
                    return;
                }

                inventoryItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'item-card';

                    let statusBtn = `<button class="buy-btn" onclick="openInvModal(${item.id})">Подробнее</button>`;
                    if(item.status === 'withdrawing') statusBtn = `<button class="buy-btn" style="color:gray; background:#222;" disabled>В обработке</button>`;
                    if(item.status === 'withdrawn') statusBtn = `<button class="buy-btn" style="color:#2a9d8f; background:rgba(42,157,143,0.1);" disabled>Выведено</button>`;

                    div.innerHTML = `
                        <img src="${item.image_url}" class="item-img" alt="">
                        <div class="item-details">
                            <div class="item-name">${item.item_name}</div>
                            ${statusBtn}
                        </div>
                    `;
                    grid.appendChild(div);
                });
            } catch(e) {}
        }

        function openInvModal(invId) {
            currentItem = inventoryItems.find(i => i.id === invId);
            if(!currentItem) return;

            document.getElementById('inv-modal-img').src = currentItem.image_url;
            document.getElementById('inv-modal-title').innerText = currentItem.item_name;

            const btn = document.getElementById('inv-modal-withdraw-btn');
            btn.onclick = () => requestWithdraw(currentItem.id);

            document.getElementById('inv-modal').classList.add('active');
        }

        async function requestWithdraw(invId) {
            try {
                const res = await fetch(`${API_BASE}/request-withdraw`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: uId, username: uName, inv_id: invId })
                });
                if(res.ok) {
                    tg.showAlert("Запрос на вывод отправлен!");
                    closeModal('inv-modal');
                    loadInventory();
                }
            } catch(e) {
                alert("Ошибка сети");
            }
        }

        async function requestTopup() {
            const amount = document.getElementById('topup-amount').value;
            if(!amount || amount <= 0) return alert("Введите корректную сумму");

            try {
                const res = await fetch(`${API_BASE}/req`);
                const data = await res.json();

                await fetch(`${API_BASE}/topup`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: uId, username: uName, amount: amount })
                });

                tg.showAlert(`Переведите ${amount}₽ по реквизитам:\n\n${data.req}\n\nПосле оплаты администратор зачислит средства.`);
                document.getElementById('topup-amount').value = '';
            } catch(e) {
                alert("Ошибка сети");
            }
        }

        // Game logic
        function openBetConfirm(color) {
            selectedBetColor = color;
            let text = color === 'red' ? 'Красное' : color === 'black' ? 'Черное' : 'Зеленое';
            document.getElementById('bet-color-text').innerText = text;
            document.getElementById('bet-modal').classList.add('active');
        }

        async function placeBet() {
            closeModal('bet-modal');
            const wheel = document.getElementById('roulette-display');
            const status = document.getElementById('game-status');

            wheel.classList.add('spin-anim');
            status.innerText = 'Ставка принята. Крутим...';
            status.style.color = 'var(--text-main)';

            try {
                const res = await fetch(`${API_BASE}/game/bet`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: uId, username: uName, color: selectedBetColor, amount: 100 })
                });
                const data = await res.json();

                setTimeout(() => {
                    wheel.classList.remove('spin-anim');
                    if(data.success) {
                        updateBalance();
                        status.innerText = data.win ? `Победа! Выпало ${data.result}` : `Поражение. Выпало ${data.result}`;
                        status.style.color = data.win ? '#2a9d8f' : '#e63946';
                    } else {
                        status.innerText = "Ошибка: " + data.error;
                    }
                }, 1500);

            } catch(e) {
                wheel.classList.remove('spin-anim');
                status.innerText = "Ошибка соединения";
            }
        }

        // Init
        tg.expand();
        updateBalance();
        updateCartCount();
        loadCatalog();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNX STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #080808;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* --- ШАПКА --- */
        header {
            width: 100%;
            padding: 40px 0 20px 0;
            text-align: center;
            position: relative;
        }

        h1 {
            font-weight: 650; 
            font-size: 1.85rem;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 1px;
            color: #fff;
            /* УСИЛЕННОЕ И ГЛАДКОЕ СВЕЧЕНИЕ */
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.2),
                0 0 25px rgba(244, 208, 63, 0.8), 
                0 0 50px rgba(244, 208, 63, 0.6),
                0 0 90px rgba(244, 208, 63, 0.3);
        }

        .subtitle {
            font-size: 0.6rem;
            color: #888;
            margin-top: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .cart-btn-header {
            position: absolute;
            right: 20px;
            top: 55%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            background: rgba(25, 25, 25, 0.9);
            border: 1px solid #333;
            padding: 5px 12px;
            border-radius: 8px;
        }

        #cart-counter {
            color: #f4d03f;
            font-weight: 500; /* Менее жирная цифра */
            margin-left: 6px;
            font-size: 0.9rem;
        }

        /* --- КАТАЛОГ --- */
        .catalog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            padding: 10px 15px;
            box-sizing: border-box;
        }

        .item-card {
            background: #111;
            border: 1px solid #1a1a1a;
            border-radius: 22px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .item-image {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .item-name {
            font-size: 1.05rem;
            font-weight: 600; 
            margin-bottom: 12px;
            color: #fff;
            
            /* СТРОГО В ОДНУ СТРОКУ И ПО КРАЯМ */
            width: 100%;
            display: block;
            white-space: nowrap;
            text-align: justify;
            text-align-last: justify;
            box-sizing: border-box;
        }

        .card-buttons {
            display: flex;
            width: 100%;
            gap: 6px;
        }

        .btn-buy-now {
            flex: 4; 
            background: #f4d03f;
            color: #000;
            border: none;
            border-radius: 8px;
            height: 32px;
            font-weight: 900;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn-add-cart {
            flex: 1.2;
            background: #000;
            border: 1.5px solid #f4d03f;
            border-radius: 8px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* --- СТРАНИЦЫ --- */
        .page { display: none; width: 100%; }
        .page-active { display: block; }

        /* --- ТАБ-БАР --- */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            border-top: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
            z-index: 100;
        }

        .tab-item { 
            color: #444; 
            font-size: 0.75rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer;
        }
        .tab-item.active { color: #f4d03f; }
    </style>
</head>
<body>

    <header>
        <h1>DNX STORE</h1>
        <div class="subtitle">Exclusive Digital Assets</div>
        <div class="cart-btn-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/>
            </svg>
            <span id="cart-counter">0</span>
        </div>
    </header>

    <div id="page-store" class="page page-active">
        <div class="catalog-grid" id="catalog-list"></div>
    </div>

    <div id="page-inventory" class="page">
        <div style="padding: 50px; text-align: center; color: #555;">
            Здесь будет ваш инвентарь
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" id="tab-store" onclick="showPage('store')">МАГАЗИН</div>
        <div class="tab-item" id="tab-inventory" onclick="showPage('inventory')">ИНВЕНТАРЬ</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = 'https://dnx-shop.onrender.com';
        let cartCount = 0;

        // Переключение страниц
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById('page-' + pageId).classList.add('page-active');
            
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + pageId).classList.add('active');
            
            tg.HapticFeedback.impactOccurred('light');
        }

        // Логика корзины
        function addToCart() {
            cartCount++;
            document.getElementById('cart-counter').innerText = cartCount;
            tg.HapticFeedback.notificationOccurred('success');
        }

        // Загрузка товаров
        async function loadCatalog() {
            try {
                const res = await fetch(`${API_BASE}/items`);
                const items = await res.json();
                document.getElementById('catalog-list').innerHTML = items.map(item => `
                    <div class="item-card">
                        <img src="${item.image_url}" class="item-image">
                        <div class="item-name">${item.name}</div>
                        <div class="card-buttons">
                            <button class="btn-buy-now" onclick="tg.showAlert('Покупка: ${item.name}')">${item.price} ₽</button>
                            <button class="btn-add-cart" onclick="addToCart()">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f4d03f" stroke-width="2.5">
                                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { 
                document.getElementById('catalog-list').innerHTML = '<p style="text-align:center;width:100%">Ошибка связи с сервером</p>';
            }
        }

        loadCatalog();
        tg.expand();
        tg.ready();
    </script>
</body>
</html>

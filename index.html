<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNX STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #080808;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* --- ШАПКА --- */
        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            position: relative;
            background: #080808;
        }

        h1 {
            font-size: 1.5rem; /* Чуть уменьшил, чтобы не съезжало */
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 4px #fff, 0 0 8px #f4d03f, 0 0 15px #f4d03f;
        }

        .subtitle {
            font-size: 0.65rem;
            color: #888;
            margin-top: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Кнопка корзины сверху (пакет) */
        .cart-btn-header {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%); /* Центрирование по вертикали */
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #333;
            padding: 6px 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .cart-icon-svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
        }

        .cart-count {
            background: #f4d03f;
            color: #000;
            font-size: 0.7rem;
            padding: 1px 6px;
            border-radius: 50%;
            margin-left: 6px;
            font-weight: 800;
        }

        /* --- СЕТКА ТОВАРОВ --- */
        .catalog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        .item-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 18px;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .item-image {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 8px;
        }

        .item-name {
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            height: 20px;
            overflow: hidden;
        }

        /* Золотая кнопка покупки (цена) */
        .buy-button-gold {
            background: linear-gradient(45deg, #d4af37, #f4d03f);
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 8px 5px;
            font-weight: 800;
            font-size: 0.85rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s;
        }

        .buy-button-gold:active { transform: scale(0.95); }

        .btn-icon-svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: #000;
            stroke-width: 2.5;
        }

        /* --- ТАБ-БАР --- */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #111;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 999;
        }

        .tab-item { color: #555; font-size: 0.7rem; font-weight: 800; cursor: pointer; text-align: center; }
        .tab-item.active { color: #f4d03f; }

        .page { display: none; width: 100%; }
        .page-active { display: block; }
    </style>
</head>
<body>

    <header>
        <h1>DNX Store</h1>
        <div class="subtitle">Exclusive Digital Assets</div>
        <div class="cart-btn-header" onclick="showPage('cart')">
            <svg class="cart-icon-svg" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
            <span class="cart-count" id="cart-counter">0</span>
        </div>
    </header>

    <div id="page-catalog" class="page page-active">
        <div id="catalog-list" class="catalog-grid"></div>
    </div>

    <div id="page-cart" class="page" style="padding: 20px; box-sizing: border-box;">
        <h2 style="text-align:center;">Корзина</h2>
        <div id="cart-items-list"></div>
        <div id="cart-total" style="text-align:right; font-weight:800; font-size:1.2rem; color:#f4d03f; margin: 20px 0;"></div>
        <button onclick="buyCart()" style="width:100%; background:#f4d03f; color:#000; border:none; padding:15px; border-radius:12px; font-weight:800;">ОПЛАТИТЬ</button>
    </div>

    <div id="page-inventory" class="page" style="padding: 20px;">
        <h2 style="text-align:center;">ИНВЕНТАРЬ</h2>
        <div id="inventory-list"></div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" id="tab-catalog" onclick="showPage('catalog')">МАГАЗИН</div>
        <div class="tab-item" id="tab-inventory" onclick="showPage('inventory')">ИНВЕНТАРЬ</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = 'https://dnx-shop.onrender.com';
        let cart = [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById('page-' + pageId).classList.add('page-active');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + pageId)?.classList.add('active');
            if(pageId === 'inventory') loadInventory();
        }

        async function loadCatalog() {
            const res = await fetch(`${API_BASE}/items`);
            const items = await res.json();
            document.getElementById('catalog-list').innerHTML = items.map(item => `
                <div class="item-card">
                    <img src="${item.image_url}" class="item-image">
                    <div class="item-name">${item.name}</div>
                    <button class="buy-button-gold" onclick="addToCart(${item.id})">
                        ${item.price} ₽
                        <svg class="btn-icon-svg" viewBox="0 0 24 24">
                            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0M12 10v6M9 13h6"/>
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            // В данной логике addToCart работает и как "Купить", добавляя в корзину
            // Если ты хочешь сразу покупку одного товара, можно сделать редирект в корзину
            const item = {id}; // Упрощенно
            if(!cart.includes(id)) {
                cart.push(id);
                document.getElementById('cart-counter').innerText = cart.length;
                tg.HapticFeedback.impactOccurred('light');
            }
            showPage('cart'); // Сразу открываем корзину после нажатия на цену
        }

        // Остальные функции (buyCart, loadInventory) оставь из прошлого кода без изменений
        loadCatalog();
    </script>
</body>
</html>

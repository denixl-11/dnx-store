<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNX STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #080808;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 80px; /* место под таб-бар */
        }

        /* --- ШАПКА --- */
        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            position: relative;
            background: #080808;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 10px #f4d03f;
        }

        .cart-btn-header {
            position: absolute;
            right: 20px;
            top: 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
        }

        .cart-count {
            background: #f4d03f;
            color: #000;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 50%;
            margin-left: 5px;
            font-weight: bold;
        }

        /* --- СТРАНИЦЫ --- */
        .page { display: none; width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; }
        .page-active { display: block; }

        /* --- СЕТКА ТОВАРОВ --- */
        .catalog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .item-card {
            background: #121212;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .item-image {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 14px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .btn-add-cart {
            background: #1a1a1a;
            border: 1px solid #f4d03f;
            color: #f4d03f;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }

        /* --- НИЖНЯЯ ПАНЕЛЬ (TAB BAR) --- */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #111;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            z-index: 1000;
        }

        .tab-item {
            color: #555;
            font-size: 0.75rem;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .tab-item.active { color: #f4d03f; }

        /* --- КОРЗИНА И ИНВЕНТАРЬ --- */
        .cart-item, .inv-item {
            background: #121212;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #222;
        }

        .main-btn {
            background: linear-gradient(45deg, #d4af37, #f4d03f);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 20px;
        }

        #payment-screen { text-align: center; }
        .requisites {
            background: #1a1a1a;
            border: 1px dashed #f4d03f;
            padding: 15px;
            color: #f4d03f;
            margin: 15px 0;
            font-family: monospace;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="header-title">DNX Store</h1>
        <div class="cart-btn-header" onclick="showPage('cart')">
            🛒<span class="cart-count" id="cart-counter">0</span>
        </div>
    </header>

    <div id="page-catalog" class="page page-active">
        <div id="catalog-list" class="catalog-grid">
            <div style="grid-column: span 2; text-align:center; padding:50px;">Загрузка...</div>
        </div>
    </div>

    <div id="page-inventory" class="page">
        <h2 style="text-align:center;">Мои активы</h2>
        <div id="inventory-list"></div>
    </div>

    <div id="page-cart" class="page">
        <h2 style="text-align:center;">Корзина</h2>
        <div id="cart-items-list"></div>
        <div id="cart-total" style="text-align:right; font-weight:bold; font-size:1.2rem; margin:15px;"></div>
        <button class="main-btn" id="btn-pay-cart" onclick="buyCart()">Оплатить заказ</button>
        <button style="background:none; border:none; color:#555; width:100%; margin-top:10px;" onclick="showPage('catalog')">Назад в каталог</button>
    </div>

    <div id="page-payment" class="page">
        <div style="background:#111; border:2px solid #d4af37; padding:25px; border-radius:25px; text-align:center;">
            <h3>Оплата</h3>
            <div id="pay-info"></div>
            <div class="requisites" id="pay-requisites"></div>
            <button class="main-btn" onclick="confirmPayment()">Я оплатил</button>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" id="tab-catalog" onclick="showPage('catalog')">🏠 Магазин</div>
        <div class="tab-item" id="tab-inventory" onclick="showPage('inventory')">📦 Инвентарь</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const API_BASE = 'https://dnx-shop.onrender.com';
        let allItems = [];
        let cart = [];

        // Переключение страниц
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById('page-' + pageId).classList.add('page-active');
            
            // Активные табы
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            if(pageId === 'catalog') document.getElementById('tab-catalog').classList.add('active');
            if(pageId === 'inventory') {
                document.getElementById('tab-inventory').classList.add('active');
                loadInventory();
            }
            if(pageId === 'cart') renderCart();
        }

        // Загрузка каталога
        async function loadCatalog() {
            try {
                const res = await fetch(`${API_BASE}/items`);
                allItems = await res.json();
                const container = document.getElementById('catalog-list');
                container.innerHTML = allItems.filter(i => i.status === 'Доступен').map(item => `
                    <div class="item-card">
                        <img src="${item.image_url}" class="item-image">
                        <div style="font-weight:bold; font-size:0.9rem;">${item.name}</div>
                        <div class="price-row">
                            <span style="color:#f4d03f">${item.price} ₽</span>
                            <button class="btn-add-cart" onclick="addToCart(${item.id})">🛒+</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        // Работа с корзиной
        function addToCart(id) {
            const item = allItems.find(i => i.id === id);
            if (!cart.find(i => i.id === id)) {
                cart.push(item);
                tg.HapticFeedback.notificationOccurred('success');
                updateCartCounter();
            } else {
                tg.showAlert("Товар уже в корзине");
            }
        }

        function updateCartCounter() {
            document.getElementById('cart-counter').innerText = cart.length;
        }

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            let total = 0;
            if(cart.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:40px; color:#555;">Корзина пуста</div>';
                document.getElementById('cart-total').innerText = "";
                document.getElementById('btn-pay-cart').style.display = "none";
                return;
            }
            
            document.getElementById('btn-pay-cart').style.display = "block";
            list.innerHTML = cart.map((item, idx) => {
                total += Number(item.price);
                return `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <div>
                            <b style="color:#f4d03f">${item.price} ₽</b>
                            <button onclick="removeFromCart(${idx})" style="background:none; border:none; color:red; margin-left:10px;">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = `Итого: ${total} ₽`;
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            updateCartCounter();
            renderCart();
        }

        // Оплата корзины
        async function buyCart() {
            tg.showConfirm(`Оплатить ${cart.length} товаров?`, async (ok) => {
                if(!ok) return;
                
                try {
                    const res = await fetch(`${API_BASE}/reserve`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            item_ids: cart.map(i => i.id),
                            user_id: tg.initDataUnsafe.user?.id || 0,
                            username: tg.initDataUnsafe.user?.username || 'Guest'
                        })
                    });
                    const result = await res.json();
                    if(result.success) {
                        showPage('payment');
                        document.getElementById('pay-info').innerText = `К оплате: ${document.getElementById('cart-total').innerText}`;
                        document.getElementById('pay-requisites').innerText = result.requisites;
                    } else {
                        tg.showAlert(result.error);
                    }
                } catch(e) { tg.showAlert("Ошибка связи с сервером"); }
            });
        }

        async function confirmPayment() {
            tg.showConfirm("Вы подтверждаете оплату?", async (ok) => {
                if(!ok) return;
                // Здесь можно вызвать /check_payment для каждого или для группы
                tg.showAlert("Запрос отправлен админу. Ожидайте подтверждения!");
                cart = [];
                updateCartCounter();
                showPage('catalog');
            });
        }

        // Инвентарь
        async function loadInventory() {
            const container = document.getElementById('inventory-list');
            container.innerHTML = "Загрузка ваших покупок...";
            try {
                const res = await fetch(`${API_BASE}/inventory?user_id=${tg.initDataUnsafe.user?.id || 0}`);
                const items = await res.json();
                if(items.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:40px; color:#555;">У вас пока нет купленных NFT</div>';
                } else {
                    container.innerHTML = items.map(item => `
                        <div class="inv-item">
                            <div style="display:flex; align-items:center;">
                                <img src="${item.image_url}" style="width:40px; height:40px; border-radius:5px; margin-right:10px;">
                                <span>${item.name}</span>
                            </div>
                            <a href="${item.nft_link}" style="color:#f4d03f; text-decoration:none; font-weight:bold;">ОТКРЫТЬ</a>
                        </div>
                    `).join('');
                }
            } catch (e) { container.innerHTML = "Ошибка загрузки"; }
        }

        // Инициализация
        loadCatalog();
    </script>
</body>
</html>

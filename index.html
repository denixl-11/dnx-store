<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNX STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* ФИКС 1: Глобальный сброс отступов и box-sizing для предотвращения вылетов за пределы экрана */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { overflow-x: hidden; width: 100%; }

        body { background-color: #080808; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 100px; -webkit-font-smoothing: antialiased; }
        header { width: 100%; padding: 40px 0 20px 0; text-align: center; position: relative; }
        h1 { font-weight: 650; font-size: 1.85rem; text-transform: uppercase; margin: 0; letter-spacing: 1px; color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2), 0 0 25px rgba(244, 208, 63, 0.8), 0 0 50px rgba(244, 208, 63, 0.6), 0 0 90px rgba(244, 208, 63, 0.3); }
        .subtitle { font-size: 0.6rem; color: #888; margin-top: 5px; letter-spacing: 2px; text-transform: uppercase; }
        .cart-btn-header { position: absolute; right: 20px; top: 55%; transform: translateY(-50%); display: flex; align-items: center; background: rgba(25, 25, 25, 0.9); border: 1px solid #333; padding: 5px 12px; border-radius: 8px; cursor: pointer; }
        #cart-counter { color: #f4d03f; font-weight: 500; margin-left: 6px; font-size: 0.9rem; }
        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; padding: 10px 15px; box-sizing: border-box; }
        .item-card { background: #111; border: 1px solid #1a1a1a; border-radius: 22px; padding: 12px; display: flex; flex-direction: column; }
        .item-image { width: 100%; aspect-ratio: 1/1; border-radius: 16px; object-fit: cover; margin-bottom: 12px; }
        .item-name { font-size: 1.05rem; font-weight: 600; margin-bottom: 12px; color: #fff; width: 100%; display: block; white-space: nowrap; text-align: justify; text-align-last: justify; }
        .item-name::after { content: ""; display: inline-block; width: 100%; }
        
        /* КНОПКИ ВЕРНУЛИ К ОРИГИНАЛУ */
        .card-buttons { display: flex; width: 100%; gap: 6px; }
        .btn-buy-now { flex: 4; background: #f4d03f; color: #000; border: none; border-radius: 8px; height: 32px; font-weight: 900; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; }
        .btn-add-cart { flex: 1.2; background: #000; border: 1.5px solid #f4d03f; border-radius: 8px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* НОВАЯ КНОПКА ТЕЛЕГРАМ СНИЗУ */
        .btn-tg-link-full {
            width: 100%;
            background: #000;
            border: 1.5px solid #f4d03f;
            border-radius: 8px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-top: 6px; /* Отступ от верхних кнопок */
            box-sizing: border-box;
            transition: 0.2s;
        }
        
        .cart-list { padding: 15px; width: 100%; box-sizing: border-box; }
        .cart-item { display: flex; align-items: center; background: #111; padding: 10px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #1a1a1a; }
        .cart-item img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; object-fit: cover; }
        .cart-item-info { flex-grow: 1; }
        .cart-item-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
        .cart-item-price { color: #f4d03f; font-weight: 700; font-size: 0.85rem; }
        .fixed-footer { position: fixed; bottom: 80px; width: 100%; padding: 15px; box-sizing: border-box; background: #080808; z-index: 90; }
        .btn-main-action { width: 100%; background: #f4d03f; color: #000; border: none; border-radius: 12px; height: 50px; font-weight: 900; font-size: 1rem; text-transform: uppercase; cursor: pointer; }
        .btn-secondary { width: 100%; background: transparent; color: #888; border: 1px solid #333; border-radius: 12px; height: 50px; font-weight: 600; font-size: 1rem; margin-top: 10px; cursor: pointer; }
        .payment-box { background: #111; padding: 20px; border-radius: 16px; border: 1px solid #1a1a1a; margin-top: 20px; }
        
        .req-input-group { display: flex; gap: 10px; margin-top: 10px; }
        .req-input { 
            flex-grow: 1; background: #000; border: 1px solid #333; color: #fff; 
            padding: 10px; border-radius: 8px; font-family: inherit; 
            font-size: 0.85rem; 
        }
        .btn-copy { 
            background: #222; border: 1px solid #444; color: #fff; 
            width: 42px; display: flex; align-items: center; justify-content: center; 
            border-radius: 8px; cursor: pointer; 
        }

        .page { display: none; width: 100%; }
        .page-active { display: block; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-around; padding: 20px 0; z-index: 100; }
        .tab-item { color: #444; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .tab-item.active { color: #f4d03f; }
        
        .btn-open-nft {
            display: flex; justify-content: center; align-items: center; 
            background: #000; color: #f4d03f; border: 1.5px solid #f4d03f; 
            text-decoration: none; border-radius: 8px; height: 32px; 
            font-weight: 800; font-size: 0.75rem; text-transform: uppercase;
            width: 100%; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <header>
        <h1>DNX STORE</h1>
        <div class="subtitle">Exclusive Digital Assets</div>
        <div class="cart-btn-header" onclick="showPage('cart')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/>
            </svg>
            <span id="cart-counter">0</span>
        </div>
    </header>

    <div id="page-store" class="page page-active">
        <div class="catalog-grid" id="catalog-list"></div>
    </div>

    <div id="page-cart" class="page">
        <div id="cart-items-list" class="cart-list"></div>
        <div class="fixed-footer" id="pay-footer" style="display: none;">
            <button class="btn-main-action" onclick="goToPayment('cart')">Перейти к оплате</button>
        </div>
    </div>

    <div id="page-payment" class="page">
        <div style="padding: 20px;">
            <h2 style="text-align: center; color: #f4d03f; margin-top: 0;">ОФОРМЛЕНИЕ ЗАКАЗА</h2>
            <p style="text-align: center; color: #888; font-size: 0.9rem;">Переведите точную сумму по реквизитам ниже. Бронь действует 20 минут.</p>
            
            <div class="payment-box">
                <div style="color: #666; font-size: 0.8rem; margin-bottom: 5px; text-transform: uppercase;">Сумма к оплате:</div>
                <div id="payment-amount" style="font-size: 1.8rem; font-weight: 900; color: #fff; margin-bottom: 20px;">0 ₽</div>
                
                <div style="color: #666; font-size: 0.8rem; text-transform: uppercase;">Реквизиты (СБП / Карта):</div>
                <div class="req-input-group">
                    <input type="text" id="req-card" class="req-input" value="1111 2222 3333 4444" readonly>
                    <button class="btn-copy" onclick="copyReq()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <button class="btn-main-action" onclick="checkPayment()">Проверить оплату</button>
                <button class="btn-secondary" onclick="cancelPayment()">Отмена</button>
            </div>
        </div>
    </div>

    <div id="page-inventory" class="page">
        <div id="inventory-container" class="catalog-grid">
            <div style="padding: 100px 20px; text-align: center; color: #555; grid-column: span 2;">ЗАГРУЗКА...</div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" id="tab-store" onclick="showPage('store')">МАГАЗИН</div>
        <div class="tab-item" id="tab-inventory" onclick="showPage('inventory')">ИНВЕНТАРЬ</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = 'https://dnx-shop.onrender.com';
        let cart = [];
        let currentBookingIds = []; 

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById('page-' + pageId).classList.add('page-active');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            
            if(pageId === 'store') document.getElementById('tab-store').classList.add('active');
            if(pageId === 'cart') renderCart();
            
            if(pageId === 'inventory') {
                document.getElementById('tab-inventory').classList.add('active');
                loadInventory(); 
            }
            
            tg.HapticFeedback.impactOccurred('light');
        }

        function openInAppBrowser(url) {
            if (!url) return;
            if (url.includes('t.me') || url.includes('telegram.me')) {
                tg.openTelegramLink(url);
            } else {
                tg.openLink(url); 
            }
        }

        function addToCart(item) {
            cart.push(item);
            document.getElementById('cart-counter').innerText = cart.length;
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert(`Добавлено: ${item.name}`);
        }

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            const footer = document.getElementById('pay-footer');
            if (cart.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding: 50px; color:#555;">Корзина пуста</div>';
                footer.style.display = 'none';
            } else {
                list.innerHTML = cart.map((item, index) => `
                    <div class="cart-item">
                        <img src="${item.image_url}">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price} ₽</div>
                        </div>
                        <div style="color: #444; font-size: 1.2rem; padding: 0 10px; cursor: pointer;" onclick="removeFromCart(${index})">×</div>
                    </div>
                `).join('');
                footer.style.display = 'block';
            }
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            document.getElementById('cart-counter').innerText = cart.length;
            renderCart();
            tg.HapticFeedback.impactOccurred('medium');
        }

        async function goToPayment(type, itemId = null, price = 0) {
            let total = 0;
            currentBookingIds = [];

            if (type === 'cart') {
                total = cart.reduce((sum, item) => sum + parseInt(item.price), 0);
                currentBookingIds = cart.map(item => item.id);
            } else {
                total = parseInt(price);
                // ФИКС 2: Конвертируем itemId в число, чтобы бэкенд корректно его воспринял
                let parsedId = isNaN(Number(itemId)) ? itemId : Number(itemId);
                currentBookingIds = [parsedId];
            }

            try {
                const response = await fetch(`${API_BASE}/book`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items: currentBookingIds,
                        userId: tg.initDataUnsafe?.user?.id,
                        username: tg.initDataUnsafe?.user?.username
                    })
                });
                
                const data = await response.json();
                if (!data.success) {
                    tg.showAlert('Один или несколько NFT уже кем-то забронированы или куплены!');
                    return; 
                }
            } catch (e) {
                console.error("Ошибка бронирования", e);
            }

            document.getElementById('payment-amount').innerText = total + ' ₽';
            showPage('payment');
        }

        function copyReq() {
            const reqInput = document.getElementById('req-card');
            reqInput.select();
            document.execCommand('copy');
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert('Реквизиты скопированы!');
        }

        async function checkPayment() {
            try {
                await fetch(`${API_BASE}/notify-admin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items: currentBookingIds,
                        userId: tg.initDataUnsafe?.user?.id,
                        username: tg.initDataUnsafe?.user?.username
                    })
                });
            } catch(e) { console.error(e); }

            tg.showAlert('Запрос отправлен администратору. Ожидайте зачисления NFT в инвентарь.');
            cart = []; 
            document.getElementById('cart-counter').innerText = '0';
            currentBookingIds = [];
            showPage('store');
        }

        async function cancelPayment() {
            try {
                await fetch(`${API_BASE}/cancel-booking`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: currentBookingIds })
                });
            } catch(e) {}
            
            currentBookingIds = [];
            showPage('store');
        }

        async function loadCatalog() {
            try {
                const res = await fetch(`${API_BASE}/items`);
                const items = await res.json();
                document.getElementById('catalog-list').innerHTML = items.map(item => `
                    <div class="item-card">
                        <img src="${item.image_url}" class="item-image">
                        <div class="item-name">${item.name}</div>
                        
                        <div class="card-buttons">
                            <button class="btn-buy-now" onclick="goToPayment('item', '${item.id}', ${item.price})">${item.price} ₽</button>
                            <button class="btn-add-cart" onclick='addToCart(${JSON.stringify(item)})'>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f4d03f" stroke-width="2.5">
                                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/>
                                </svg>
                            </button>
                        </div>
                        
                        <button class="btn-tg-link-full" onclick="openInAppBrowser('${item.nft_link}')">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="#f4d03f">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.06-.2-.07-.06-.17-.04-.25-.02-.11.02-1.83 1.16-5.16 3.41-.48.33-.92.5-1.32.49-.44-.01-1.28-.24-1.9-.44-.76-.25-1.36-.38-1.3-.8.03-.22.33-.45.9-.68 3.55-1.54 5.92-2.57 7.11-3.06 3.39-1.4 4.1-1.65 4.56-1.66.11 0 .33.03.47.14.12.1.15.24.16.35-.01.06-.01.17-.02.28z"/>
                            </svg>
                        </button>
                    </div>
                `).join('');
            } catch (e) { 
                document.getElementById('catalog-list').innerHTML = '<p style="text-align:center;width:100%;color:#555; grid-column: span 2;">Ошибка загрузки товаров</p>';
            }
        }

        async function loadInventory() {
            const userId = tg.initDataUnsafe?.user?.id;
            const container = document.getElementById('inventory-container');
            
            if (!userId) {
                container.innerHTML = '<div style="padding: 100px 20px; text-align: center; color: #555; grid-column: span 2;">ОШИБКА: НЕТ ID ПОЛЬЗОВАТЕЛЯ</div>';
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/inventory?user_id=${userId}`);
                const items = await res.json();
                
                if (!items || items.length === 0) {
                    container.innerHTML = '<div style="padding: 100px 20px; text-align: center; color: #555; grid-column: span 2;">ИНВЕНТАРЬ ПУСТ</div>';
                } else {
                    container.innerHTML = items.map(item => `
                        <div class="item-card">
                            <img src="${item.image_url}" class="item-image" style="margin-bottom: 8px;">
                            <div class="item-name" style="margin-bottom: 8px;">${item.name}</div>
                            <button class="btn-open-nft" onclick="openInAppBrowser('${item.nft_link}')">Открыть NFT</button>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error("Ошибка загрузки инвентаря", e);
                container.innerHTML = '<div style="padding: 100px 20px; text-align: center; color: #555; grid-column: span 2;">ОШИБКА ЗАГРУЗКИ</div>';
            }
        }

        loadCatalog();
        tg.expand();
        tg.ready();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DNX STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* все стили такие же, как в предыдущей версии (полные) – для краткости оставлю без изменений */
        :root {
            --bg-main: #0a0a0c;
            --bg-card: linear-gradient(145deg, #131315 0%, #0d0d0f 100%);
            --accent-gold: #cba153;
            --text-main: #e8e8e8;
            --text-muted: #7a7a7c;
            --border-color: #222224;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { overflow-x: hidden; width: 100%; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
        }
        header { ... } /* полный стиль из вашего index2.html */
        /* ... все остальные стили полностью сохранены ... */
    </style>
</head>
<body>
    <!-- полная разметка из index2.html (без изменений) -->
    <!-- ... -->

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = 'https://dnx-shop.onrender.com';

        let userBalance = 0.0;
        let cart = JSON.parse(localStorage.getItem('dnx_cart') || '[]');
        let currentCatalog = [];
        let inventoryData = [];
        let pendingTopupAmount = 0;
        let betAmountTemp = 0;

        const uId = tg.initDataUnsafe?.user?.id || "guest_id";
        const uName = tg.initDataUnsafe?.user?.username || "Guest";
        const uAvatar = tg.initDataUnsafe?.user?.photo_url || "";
        document.getElementById('username-display').innerText = uName;
        if(uAvatar) document.getElementById('avatar-img').src = uAvatar;

        // Все вспомогательные функции (showAlert, closeModal, showPage, updateBalance, loadCatalog, escapeHtml, openNftModal, ...)
        // они такие же, как в вашем index2.html – для краткости не копирую, но в финальном файле они будут.

        // ======================== ИГРА (синхронизированная, с правильным временем) ========================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gState = { players: [], pool: 0, status: 'waiting', timer: 15, winner_x: null, spin_start_time: null, last_winner: null };
        let isSpinning = false;
        let animationFrameId = null;
        let lastServerTimer = 15;
        let localTimer = 15;
        let timerInterval = null;

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * 2;
            canvas.height = rect.height * 2;
            drawGameFrame();
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);

        function drawGameFrame(ballX = null) {
            if(!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(!gState.players || gState.players.length === 0) {
                ctx.fillStyle = "rgba(255,255,255,0.05)";
                ctx.fillRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = "#555";
                ctx.font = "30px Inter";
                ctx.textAlign = "center";
                ctx.fillText("Ждем ставки...", canvas.width/2, canvas.height/2);
                return;
            }
            let curX = 0;
            gState.players.forEach(p => {
                let w = (p.amount / gState.pool) * canvas.width;
                ctx.fillStyle = p.color;
                ctx.fillRect(curX, 0, w, canvas.height);
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(curX, canvas.height-40, w, 40);
                ctx.fillStyle = "#fff";
                ctx.font = "24px Inter";
                ctx.textAlign = "center";
                ctx.fillText(p.username.substring(0,6), curX + w/2, canvas.height - 12);
                curX += w;
            });
            if(ballX !== null && ballX !== undefined) {
                ctx.beginPath();
                ctx.arc(ballX, canvas.height/2, 20, 0, Math.PI*2);
                ctx.fillStyle = "#fff";
                ctx.shadowColor = "#fff";
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.closePath();
                ctx.beginPath();
                ctx.moveTo(ballX, 0);
                ctx.lineTo(ballX, canvas.height);
                ctx.strokeStyle = "rgba(255,255,255,0.8)";
                ctx.lineWidth = 4;
                ctx.stroke();
            }
        }

        function renderBetsList() { /* как в index2.html */ }
        function startLocalTimer(val) { /* как в index2.html */ }
        function showWinnerModal(winner) { /* как в index2.html */ }
        function closeWinnerModal() { /* как в index2.html */ }

        // Синхронизированная анимация с отскоками, использует абсолютное время сервера
        function runSpinAnimation(targetX, serverStartTime) {
            if(animationFrameId) cancelAnimationFrame(animationFrameId);
            const now = Date.now() / 1000;
            let elapsed = now - serverStartTime;
            const MOVE_DURATION = 10;   // 10 секунд движения
            const PAUSE_DURATION = 2;    // 2 секунды паузы
            if (elapsed >= MOVE_DURATION + PAUSE_DURATION) {
                drawGameFrame(targetX);
                return;
            }
            let x = 0;
            let v = 4000;
            const deceleration = v / MOVE_DURATION;
            let prevTime = serverStartTime;
            function animate() {
                const nowSec = Date.now() / 1000;
                let t = Math.min(nowSec, serverStartTime + MOVE_DURATION + PAUSE_DURATION);
                if (t >= serverStartTime + MOVE_DURATION + PAUSE_DURATION) {
                    drawGameFrame(targetX);
                    animationFrameId = null;
                    return;
                }
                let dt = Math.min(0.05, t - prevTime);
                if (dt <= 0) {
                    animationFrameId = requestAnimationFrame(animate);
                    return;
                }
                prevTime = t;
                let elapsedMove = Math.min(MOVE_DURATION, Math.max(0, t - serverStartTime));
                let speed = v - deceleration * elapsedMove;
                if (speed < 0) speed = 0;
                let step = speed * dt;
                x += step;
                if (x < 0) {
                    x = -x;
                } else if (x > canvas.width) {
                    x = 2 * canvas.width - x;
                }
                drawGameFrame(x);
                animationFrameId = requestAnimationFrame(animate);
            }
            prevTime = serverStartTime;
            animationFrameId = requestAnimationFrame(animate);
        }

        async function pollGame() {
            try {
                const r = await fetch(`${API_BASE}/game/state`);
                const newState = await r.json();
                gState = newState;

                if (gState.status === 'counting' && gState.timer !== lastServerTimer) {
                    if (Math.abs(localTimer - gState.timer) > 1) startLocalTimer(gState.timer);
                    lastServerTimer = gState.timer;
                } else if (gState.status !== 'counting') {
                    const timerBg = document.getElementById('game-timer-bg');
                    if(timerBg && gState.status !== 'spinning') timerBg.innerText = '';
                    if(gState.status !== 'spinning' && timerInterval) { clearInterval(timerInterval); timerInterval = null; }
                }

                document.getElementById('game-players-count').innerText = `Игроки: ${gState.players.length}/20`;
                renderBetsList();

                const hasMyBet = gState.players.find(p => p.id === String(uId));
                const cancelBtn = document.getElementById('btn-cancel-bet');
                if(cancelBtn) cancelBtn.style.display = (gState.players.length === 1 && hasMyBet && gState.status === 'waiting') ? 'block' : 'none';

                if (gState.status === 'spinning' && !isSpinning && gState.winner_x !== null && gState.spin_start_time !== null) {
                    isSpinning = true;
                    const targetX = gState.winner_x * canvas.width;
                    runSpinAnimation(targetX, gState.spin_start_time);
                } else if (gState.status !== 'spinning' && isSpinning) {
                    isSpinning = false;
                    if(animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }
                    drawGameFrame();
                } else if (gState.status !== 'spinning' && !isSpinning) {
                    drawGameFrame();
                }

                if (gState.last_winner && !window._winnerShown) {
                    window._winnerShown = true;
                    showWinnerModal(gState.last_winner);
                    setTimeout(() => { window._winnerShown = false; }, 5000);
                }
            } catch(e) { console.error(e); }
        }
        setInterval(pollGame, 1000);

        function openBetConfirm(amt) { betAmountTemp = amt; document.getElementById('confirm-bet-amount').innerText = amt; document.getElementById('confirm-bet-modal').classList.add('active'); }
        function openCustomBet() { document.getElementById('custom-bet-input').value = ''; document.getElementById('custom-bet-modal').classList.add('active'); }
        function submitCustomBet() { const v = parseFloat(document.getElementById('custom-bet-input').value); if(v > 0) { closeModal('custom-bet-modal'); openBetConfirm(v); } else showAlert("Введите сумму больше 0"); }
        async function executeBet() {
            const btn = document.getElementById('btn-confirm-bet');
            if(btn) { btn.disabled = true; btn.innerText = 'Загрузка...'; }
            if(userBalance < betAmountTemp) { showAlert("Недостаточно средств на балансе!"); closeModal('confirm-bet-modal'); if(btn) { btn.disabled = false; btn.innerText = 'Подтвердить'; } return; }
            try {
                const r = await fetch(`${API_BASE}/game/bet`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: uId, username: uName, amount: betAmountTemp}) });
                const d = await r.json(); closeModal('confirm-bet-modal');
                if(d.success) { await updateBalance(); await pollGame(); }
                else { let msg = "Ставка не принята"; if (d.error === 'insufficient_funds') msg = "Недостаточно средств!"; if (d.error === 'game_started') msg = "Игра уже началась, подождите!"; if (d.error === 'room_full') msg = "В комнате уже 20 игроков!"; showAlert(msg); }
            } catch(e) { closeModal('confirm-bet-modal'); showAlert("Ошибка сети, попробуйте снова"); }
            if(btn) { btn.disabled = false; btn.innerText = 'Подтвердить'; }
        }
        async function cancelGameBet() { try { await fetch(`${API_BASE}/game/cancel`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: uId}) }); updateBalance(); pollGame(); } catch(e) {} }

        document.getElementById('cart-counter').innerText = cart.length;
        updateBalance(); loadCatalog();
        try { tg.expand(); tg.ready(); } catch(e) {}
    </script>
</body>
</html>

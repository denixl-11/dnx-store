<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNX STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #080808;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* --- ШАПКА --- */
        header {
            width: 100%;
            padding: 40px 0 20px 0;
            text-align: center;
            position: relative;
        }

        h1 {
            font-weight: 650; 
            font-size: 1.85rem;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 1px;
            color: #fff;
            /* Свечение +0.1 */
            text-shadow: 
                0 0 12px rgba(255, 255, 255, 0.8), 
                0 0 28px rgba(244, 208, 63, 1),
                0 0 45px rgba(244, 208, 63, 0.5);
        }

        .subtitle {
            font-size: 0.6rem;
            color: #888;
            margin-top: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .cart-btn-header {
            position: absolute;
            right: 20px;
            top: 55%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            background: rgba(25, 25, 25, 0.9);
            border: 1px solid #333;
            padding: 5px 10px;
            border-radius: 8px;
        }

        /* --- КАТАЛОГ --- */
        .catalog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            padding: 10px 15px;
            box-sizing: border-box;
        }

        .item-card {
            background: #111;
            border: 1px solid #1a1a1a;
            border-radius: 22px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .item-image {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .item-name {
            /* Шрифт чуть-чуть больше, не жирный, ширина как у картинки */
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #fff;
            text-align: left;
            width: 100%; 
            display: block;
            box-sizing: border-box;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-buttons {
            display: flex;
            width: 100%;
            gap: 6px;
        }

        .btn-buy-now {
            flex: 4; 
            background: #f4d03f;
            color: #000;
            border: none;
            border-radius: 8px;
            height: 32px;
            font-weight: 900;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn-add-cart {
            flex: 1.2;
            background: #000;
            border: 1.5px solid #f4d03f;
            border-radius: 8px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* --- ТАБ-БАР --- */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            border-top: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
        }

        .tab-item { color: #444; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .tab-item.active { color: #f4d03f; }

        .page { display: none; width: 100%; }
        .page-active { display: block; }
    </style>
</head>
<body>

    <header>
        <h1>DNX STORE</h1>
        <div class="subtitle">Exclusive Digital Assets</div>
        <div class="cart-btn-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/>
            </svg>
            <span id="cart-counter" style="color:#f4d03f; font-weight:900; margin-left: 5px;">0</span>
        </div>
    </header>

    <div id="page-catalog" class="page page-active">
        <div id="catalog-list" class="catalog-grid"></div>
    </div>

    <div id="page-inventory" class="page">
        <div id="inventory-list" style="padding: 20px; text-align: center; color: #555; margin-top: 150px;">
            В вашем инвентаре сейчас нет предметов
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" id="tab-catalog" onclick="showPage('catalog')">МАГАЗИН</div>
        <div class="tab-item" id="tab-inventory" onclick="showPage('inventory')">ИНВЕНТАРЬ</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = 'https://dnx-shop.onrender.com';
        let cart = [];
        let allItems = [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById('page-' + pageId).classList.add('page-active');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + pageId).classList.add('active');
            if(pageId === 'inventory') loadInventory();
        }

        async function loadCatalog() {
            try {
                const res = await fetch(`${API_BASE}/items`);
                allItems = await res.json();
                document.getElementById('catalog-list').innerHTML = allItems.map(item => `
                    <div class="item-card">
                        <img src="${item.image_url}" class="item-image">
                        <div class="item-name">${item.name}</div>
                        <div class="card-buttons">
                            <button class="btn-buy-now">${item.price} ₽</button>
                            <button class="btn-add-cart" onclick="addToCart(${item.id})">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f4d03f" stroke-width="2.5">
                                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error("Ошибка загрузки"); }
        }

        function addToCart(id) {
            if(!cart.includes(id)) {
                cart.push(id);
                document.getElementById('cart-counter').innerText = cart.length;
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        async function loadInventory() {
            const container = document.getElementById('inventory-list');
            const userId = tg.initDataUnsafe?.user?.id || 12345;
            try {
                const res = await fetch(`${API_BASE}/inventory/${userId}`);
                const data = await res.json();
                if (data && data.length > 0) {
                    container.innerHTML = data.map(i => `<div style="padding:15px; border-bottom:1px solid #222;">${i.name}</div>`).join('');
                }
            } catch (e) { console.error("Ошибка инвентаря"); }
        }

        loadCatalog();
        tg.expand();
        tg.ready();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNX STORE — Premium NFT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #080808;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 10px;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(45deg, #d4af37, #f4d03f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .subtitle {
            font-size: 0.75rem;
            color: #888;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        #catalog {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        .item-card {
            background: #121212;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 10px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease forwards;
            cursor: pointer;
        }

        /* ЭФФЕКТ ПОДСВЕТКИ ПРИ НАВЕДЕНИИ */
        .item-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.1);
        }

        .item-card:active {
            transform: scale(0.96);
        }

        .item-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 14px;
            margin-bottom: 10px;
            background: #1a1a1a;
        }

        /* ПОЧТИ ПРОЗРАЧНЫЕ ФЛАЖКИ */
        .status-badge {
            position: absolute;
            top: 18px;
            left: 18px;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.55rem;
            font-weight: 700;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            z-index: 2;
        }

        .status-available { background: rgba(0, 255, 100, 0.12); color: rgba(0, 255, 100, 0.8); }
        .status-sold { background: rgba(255, 50, 50, 0.15); color: rgba(255, 157, 157, 0.8); }
        .status-booked { background: rgba(212, 175, 55, 0.15); color: rgba(244, 208, 63, 0.8); }

        .item-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .item-name {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-price-tag {
            font-size: 0.6rem;
            color: #555;
            text-transform: uppercase;
        }

        .item-price-value {
            font-size: 1rem;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 10px;
        }

        button {
            background: linear-gradient(45deg, #d4af37, #f4d03f);
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 8px;
            width: 100%;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: auto;
        }

        /* СТИЛИ ДЛЯ ПРОСМОТРА ФОТО */
        #image-viewer {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.92);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
        }

        #full-image {
            max-width: 90%;
            max-height: 80%;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .close-viewer {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 35px;
            color: #fff;
            cursor: pointer;
            opacity: 0.7;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>DNX Store</h1>
        <div class="subtitle">Exclusive Digital Assets</div>
    </header>

    <div id="catalog">
        <div style="grid-column: span 2; text-align:center; color: #666; padding: 40px;">Загрузка активов...</div>
    </div>

    <div id="image-viewer" onclick="closeImage()">
        <span class="close-viewer">&times;</span>
        <img id="full-image" src="">
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#080808';

        const API_URL = 'https://dnx-shop.onrender.com/items';

        // Функция просмотра фото
        function openImage(event, url) {
            event.stopPropagation();
            const viewer = document.getElementById('image-viewer');
            const fullImg = document.getElementById('full-image');
            fullImg.src = url;
            viewer.style.display = 'flex';
        }

        function closeImage() {
            document.getElementById('image-viewer').style.display = 'none';
        }

        async function loadItems() {
            const container = document.getElementById('catalog');
            try {
                const response = await fetch(API_URL);
                const items = await response.json();
                
                if (!items || items.length === 0) {
                    container.innerHTML = '<div style="grid-column: span 2; text-align:center; color:#666;">Витрина пуста</div>';
                    return;
                }

                container.innerHTML = items.map(item => {
                    let statusClass = 'status-available';
                    let statusText = item.status || 'В наличии';
                    
                    if (item.status?.toLowerCase().includes('продан')) statusClass = 'status-sold';
                    if (item.status?.toLowerCase().includes('забронирован')) statusClass = 'status-booked';

                    const imgUrl = item.image_url || 'https://via.placeholder.com/400x400?text=NFT';

                    return `
                        <div class="item-card" onclick="openImage(event, '${imgUrl}')">
                            <img src="${imgUrl}" class="item-image" onerror="this.src='https://via.placeholder.com/400x400?text=No+Image'">
                            <div class="status-badge ${statusClass}">${statusText}</div>
                            <div class="item-info">
                                <div class="item-name">${item.name}</div>
                                <div class="item-price-tag">Стоимость</div>
                                <div class="item-price-value">${item.price} TON</div>
                                <button onclick="buyItem(event, '${item.name}')">Купить</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                container.innerHTML = '<div style="grid-column: span 2; text-align:center; color:#d4af37;">Ошибка связи</div>';
            }
        }

        function buyItem(event, name) {
            event.stopPropagation();
            tg.sendData("buy:" + name); 
            tg.HapticFeedback.notificationOccurred('success');
            tg.close();
        }

        loadItems();
    </script>
</body>
</html>

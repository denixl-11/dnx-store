<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNX STORE — Premium NFT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- ТВОИ ИСХОДНЫЕ СТИЛИ (ПОЛНОСТЬЮ СОХРАНЕНЫ) --- */
        body {
            background-color: #080808;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 10px;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(45deg, #d4af37, #f4d03f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            animation: permanentGlow 2s infinite alternate ease-in-out;
        }

        @keyframes permanentGlow {
            from {
                text-shadow: 0 0 10px rgba(212, 175, 55, 0.4), 0 0 20px rgba(212, 175, 55, 0.2);
                transform: scale(1);
            }
            to {
                text-shadow: 0 0 20px rgba(212, 175, 55, 0.8), 0 0 40px rgba(212, 175, 55, 0.4);
                transform: scale(1.03);
            }
        }

        .subtitle {
            font-size: 0.75rem;
            color: #888;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        #catalog {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        .item-card {
            background: #121212;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 10px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease forwards;
            cursor: pointer;
        }

        .item-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.1);
        }

        .item-card:active {
            transform: scale(0.96);
        }

        .item-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 14px;
            margin-bottom: 10px;
            background: #1a1a1a;
        }

        .status-badge {
            position: absolute;
            top: 18px;
            left: 18px;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.55rem;
            font-weight: 700;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            z-index: 2;
        }

        .status-available { background: rgba(0, 255, 100, 0.12); color: rgba(0, 255, 100, 0.8); }
        .status-sold { background: rgba(255, 50, 50, 0.15); color: rgba(255, 157, 157, 0.8); }
        .status-booked { background: rgba(212, 175, 55, 0.15); color: rgba(244, 208, 63, 0.8); }

        .item-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .item-name {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-price-tag {
            font-size: 0.6rem;
            color: #555;
            text-transform: uppercase;
        }

        .item-price-value {
            font-size: 1rem;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 10px;
        }

        button {
            background: linear-gradient(45deg, #d4af37, #f4d03f);
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 10px;
            width: 100%;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: auto;
            transition: 0.2s;
        }

        button:active { transform: scale(0.98); opacity: 0.9; }

        #payment-screen {
            display: none;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.4s ease-out;
            text-align: center;
        }

        .pay-card {
            background: #111;
            border: 2px solid #d4af37;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
            margin-top: 20px;
        }

        .pay-title {
            color: #d4af37;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .pay-row {
            margin: 15px 0;
            font-size: 0.9rem;
            color: #888;
        }

        .pay-row b { color: #fff; }

        .requisites-container {
            background: #1a1a1a;
            border: 1px dashed #d4af37;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 0.85rem;
            color: #f4d03f;
            white-space: pre-line;
            word-break: break-all;
        }

        .btn-check {
            height: 45px;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        
        /* Стиль для заблокированной кнопки */
        .btn-check:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-back {
            background: none;
            color: #555;
            border: 1px solid #333;
            margin-top: 15px;
        }

        #image-viewer {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.92);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
        }

        #full-image {
            max-width: 90%;
            max-height: 80%;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .close-viewer {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 35px;
            color: #fff;
            cursor: pointer;
            opacity: 0.7;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <h1>DNX Store</h1>
        <div class="subtitle">Exclusive Digital Assets</div>
    </header>

    <div id="catalog">
        <div style="grid-column: span 2; text-align:center; color: #666; padding: 40px;">Загрузка активов...</div>
    </div>

    <div id="payment-screen">
        <div class="pay-card">
            <div class="pay-title">Оформление заказа</div>
            <div class="pay-row">Ассет: <b id="pay-name">---</b></div>
            <div class="pay-row">Сумма: <b id="pay-price" style="color: #d4af37; font-size: 1.1rem;">---</b></div>
            
            <div style="font-size: 0.75rem; color: #666; margin-top: 10px;">Переведите средства по реквизитам:</div>
            <div class="requisites-container" id="pay-requisites">
                Загрузка реквизитов...
            </div>

            <button class="btn-check" id="btn-check-pay" onclick="checkPayment()">Проверить оплату</button>
        </div>
        <button class="btn-back" onclick="window.location.reload()">Вернуться в каталог</button>
    </div>

    <div id="image-viewer" onclick="closeImage()">
        <span class="close-viewer">&times;</span>
        <img id="full-image" src="">
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#080808';

        const API_BASE = 'https://dnx-shop.onrender.com';
        let currentPendingItemId = null; // ID товара, который сейчас оформляется

        function openImage(event, url) {
            event.stopPropagation();
            const viewer = document.getElementById('image-viewer');
            const fullImg = document.getElementById('full-image');
            fullImg.src = url;
            viewer.style.display = 'flex';
        }

        function closeImage() {
            document.getElementById('image-viewer').style.display = 'none';
        }

        async function loadItems() {
            const container = document.getElementById('catalog');
            try {
                const response = await fetch(`${API_BASE}/items`);
                const items = await response.json();
                
                if (!items || items.length === 0) {
                    container.innerHTML = '<div style="grid-column: span 2; text-align:center; color:#666;">Витрина пуста</div>';
                    return;
                }

                container.innerHTML = items.map(item => {
                    let statusClass = 'status-available';
                    let statusText = item.status || 'В наличии';
                    let isAvailable = true;
                    
                    if (item.status === 'Продан') {
                        statusClass = 'status-sold';
                        isAvailable = false;
                    } else if (item.status === 'Забронирован') {
                        statusClass = 'status-booked';
                        isAvailable = false;
                    }

                    const imgUrl = item.image_url || 'https://via.placeholder.com/400x400?text=NFT';

                    return `
                        <div class="item-card" onclick="openImage(event, '${imgUrl}')">
                            <img src="${imgUrl}" class="item-image" onerror="this.src='https://via.placeholder.com/400x400?text=No+Image'">
                            <div class="status-badge ${statusClass}">${statusText}</div>
                            <div class="item-info">
                                <div class="item-name">${item.name}</div>
                                <div class="item-price-tag">Стоимость</div>
                                <div class="item-price-value">${item.price} TON</div>
                                ${isAvailable ? 
                                    `<button onclick="buyItem(event, ${item.id}, '${item.name}', '${item.price}')">Купить</button>` : 
                                    `<button style="background: #222; color: #555; cursor: default;" onclick="event.stopPropagation()">Недоступен</button>`
                                }
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                container.innerHTML = '<div style="grid-column: span 2; text-align:center; color:#d4af37;">Ошибка связи</div>';
            }
        }

        async function buyItem(event, id, name, price) {
            event.stopPropagation();
            tg.HapticFeedback.impactOccurred('medium');

            try {
                const response = await fetch(`${API_BASE}/reserve`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        item_id: id,
                        user_id: tg.initDataUnsafe.user?.id || 0,
                        username: tg.initDataUnsafe.user?.username || 'Guest'
                    })
                });

                const result = await response.json();

                if (result.success) {
                    currentPendingItemId = id; // Запоминаем ID
                    document.getElementById('catalog').style.display = 'none';
                    document.getElementById('main-header').style.display = 'none';
                    document.getElementById('payment-screen').style.display = 'block';

                    document.getElementById('pay-name').innerText = name;
                    document.getElementById('pay-price').innerText = price + ' TON';
                    document.getElementById('pay-requisites').innerText = result.requisites || "Реквизиты загружаются...";
                } else {
                    tg.showAlert(result.error || "Товар уже занят");
                }
            } catch (e) {
                tg.showAlert("Ошибка при связи с сервером.");
            }
        }

        async function checkPayment() {
            if (!currentPendingItemId) return;

            tg.HapticFeedback.notificationOccurred('success');
            
            tg.showConfirm("Вы точно совершили оплату? Администратор проверит транзакцию.", async (confirmed) => {
                if (confirmed) {
                    const btn = document.getElementById('btn-check-pay');
                    btn.disabled = true;
                    btn.innerText = "Ожидайте подтверждения...";
                    
                    try {
                        // Отправляем запрос на сервер, чтобы уведомить админа
                        const response = await fetch(`${API_BASE}/check_payment`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                item_id: currentPendingItemId,
                                user_id: tg.initDataUnsafe.user?.id || 0,
                                username: tg.initDataUnsafe.user?.username || 'Guest'
                            })
                        });

                        if (response.ok) {
                            tg.showAlert("Заявка отправлена! Ожидайте уведомления в боте. Это окно можно закрыть.");
                            setTimeout(() => tg.close(), 3000);
                        } else {
                            btn.disabled = false;
                            btn.innerText = "Проверить оплату";
                            tg.showAlert("Ошибка отправки заявки.");
                        }
                    } catch (e) {
                        tg.showAlert("Сервер не отвечает.");
                        btn.disabled = false;
                        btn.innerText = "Проверить оплату";
                    }
                }
            });
        }

        loadItems();
    </script>
</body>
</html>
